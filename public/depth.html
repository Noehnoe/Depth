<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEPTH</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Courier New", monospace;
    color: #eee;
    overflow: hidden;
  }
  canvas {
    background: #000;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    cursor: crosshair;
    display: block;
  }
  #loginOverlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #1a0830 0%, #06030c 70%, #000 100%);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    font-family: "Courier New", monospace;
  }
  #loginOverlay.show { display: flex; }
  #loginCard {
    width: min(380px, 90vw);
    background: #120820;
    border: 3px solid #5a3aa0;
    box-shadow: 0 0 40px #5a3aa0, 0 0 4px #a880ff inset;
    padding: 24px 22px 22px;
    color: #fff;
  }
  #loginCard h1 {
    margin: 0 0 4px;
    font-size: 38px;
    text-align: center;
    color: #ffe080;
    letter-spacing: 4px;
    text-shadow: 2px 2px 0 #1a0820;
  }
  #loginCard .sub {
    text-align: center;
    color: #aaa8c8;
    font-size: 12px;
    margin-bottom: 18px;
  }
  #tabs { display: flex; gap: 0; margin-bottom: 14px; }
  #tabs button {
    flex: 1;
    background: #1a0e2a;
    color: #aaa8c8;
    border: 2px solid #3a1c5a;
    padding: 9px 0;
    font: bold 13px "Courier New", monospace;
    cursor: pointer;
  }
  #tabs button.active {
    background: #3a1c5a;
    color: #ffe080;
    border-color: #a880ff;
  }
  #loginCard label {
    display: block;
    font-size: 11px;
    color: #aaa8c8;
    margin: 10px 0 4px;
    letter-spacing: 1px;
  }
  #loginCard input {
    width: 100%;
    box-sizing: border-box;
    background: #06030c;
    color: #fff;
    border: 2px solid #3a1c5a;
    padding: 10px;
    font: 14px "Courier New", monospace;
    outline: none;
  }
  #loginCard input:focus { border-color: #a880ff; }
  #loginCard button.action {
    width: 100%;
    margin-top: 14px;
    background: #3a1c5a;
    color: #ffe080;
    border: 2px solid #a880ff;
    padding: 12px;
    font: bold 14px "Courier New", monospace;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #loginCard button.action:hover { background: #5a3aa0; }
  #loginCard button.action:disabled { background: #1a1430; color: #555; border-color: #2a2438; cursor: not-allowed; }
  #loginErr {
    color: #ff6060;
    font-size: 12px;
    text-align: center;
    margin-top: 10px;
    min-height: 14px;
  }
  #adminPinOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 11;
    font-family: "Courier New", monospace;
  }
  #adminPinOverlay.show { display: flex; }
  #adminPinCard {
    width: min(340px, 90vw);
    background: #120820;
    border: 3px solid #ff4040;
    box-shadow: 0 0 40px #ff4040, 0 0 4px #ff8080 inset;
    padding: 22px 22px 18px;
    color: #fff;
    text-align: center;
  }
  #adminPinCard h2 {
    margin: 0 0 6px;
    color: #ff8080;
    font-size: 22px;
    letter-spacing: 3px;
  }
  #adminPinCard .sub {
    color: #aa8888;
    font-size: 11px;
    margin-bottom: 14px;
  }
  #adminPinInput {
    width: 100%;
    box-sizing: border-box;
    background: #06030c;
    color: #ffe080;
    border: 2px solid #5a1c1c;
    padding: 14px;
    font: bold 22px "Courier New", monospace;
    text-align: center;
    letter-spacing: 8px;
    outline: none;
  }
  #adminPinInput:focus { border-color: #ff4040; }
  #adminPinCard .btnRow { display: flex; gap: 8px; margin-top: 12px; }
  #adminPinCard button {
    flex: 1;
    background: #3a1c1c;
    color: #ff8080;
    border: 2px solid #5a2c2c;
    padding: 10px;
    font: bold 13px "Courier New", monospace;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #adminPinCard button.go { background: #5a1c1c; color: #ffe080; border-color: #ff4040; }
  #adminPinCard button.go:hover { background: #7a2c2c; }
  #adminPinErr {
    color: #ff6060;
    font-size: 12px;
    margin-top: 8px;
    min-height: 14px;
  }
  #chatOverlay {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 12;
    width: min(540px, 90vw);
    background: rgba(10,8,20,0.92);
    border: 2px solid #5a3aa0;
    box-shadow: 0 0 20px rgba(90,58,160,0.45);
    padding: 6px 8px;
    font-family: "Courier New", monospace;
  }
  #chatOverlay.show { display: flex; align-items: center; gap: 6px; }
  #chatPrompt {
    color: #ffe080;
    font-weight: bold;
    font-size: 13px;
    flex-shrink: 0;
  }
  #chatInput {
    flex: 1;
    background: #06030c;
    color: #fff;
    border: 1px solid #3a2a4a;
    padding: 7px 9px;
    font: 13px "Courier New", monospace;
    outline: none;
  }
  #chatInput:focus { border-color: #a880ff; }
  #machineSearch {
    position: fixed;
    display: none;
    z-index: 8;
    background: #06030c;
    color: #fff;
    border: 2px solid #5a3aa0;
    padding: 6px 10px;
    font: 13px "Courier New", monospace;
    outline: none;
  }
  #machineSearch:focus { border-color: #a880ff; }
  #machineSearch.show { display: block; }
  #adminSpawnOverlay {
    position: fixed;
    top: 72px;
    right: 20px;
    width: min(360px, 90vw);
    height: calc(100% - 104px);
    display: none;
    z-index: 11;
    background: rgba(10,8,16,0.95);
    color: #fff;
    border: 2px solid #5a3aa0;
    border-radius: 12px;
    box-shadow: 0 0 18px rgba(90,58,160,0.45);
    padding: 12px;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }
  #adminSpawnOverlay.show { display: block; }
  #adminSpawnOverlay h3 {
    margin: 0 0 6px;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: #ffe080;
  }
  #adminSpawnInfo {
    margin: 0 0 10px;
    font-size: 11px;
    color: #ccc;
  }
  #adminSpawnSearch {
    width: 100%;
    box-sizing: border-box;
    margin: 0 0 8px;
    background: #06030c;
    color: #fff;
    border: 2px solid #5a3aa0;
    padding: 8px 10px;
    font: 13px "Courier New", monospace;
    outline: none;
  }
  #adminSpawnSearch:focus { border-color: #a880ff; }
  #adminSpawnCount {
    margin: 0 0 8px;
    font-size: 11px;
    color: #aaa;
  }
  #adminSpawnList {
    width: 100%;
    height: calc(100% - 106px);
    overflow-y: auto;
    padding-right: 4px;
  }
  .spawnRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
    padding: 8px 8px;
    border: 1px solid #3a2a4a;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
  }
  .spawnRowName {
    flex: 1;
    font-size: 12px;
    text-transform: uppercase;
    color: #fff;
  }
  .spawnRowValue {
    width: 84px;
    text-align: right;
    font-size: 11px;
    color: #a0c0ff;
  }
  .spawnRow button {
    background: #5a3aa0;
    border: 1px solid #8a6af0;
    color: #fff;
    padding: 5px 8px;
    font: 11px "Courier New", monospace;
    cursor: pointer;
    border-radius: 5px;
  }
  .spawnRow button:hover { background: #7a5ae0; }
</style>
</head>
<body>
<div id="loginOverlay">
  <div id="loginCard">
    <h1>DEPTH</h1>
    <div class="sub">enter the mines</div>
    <div id="tabs">
      <button id="tabLogin" class="active">LOGIN</button>
      <button id="tabRegister">REGISTER</button>
    </div>
    <label for="userInput">USERNAME</label>
    <input id="userInput" type="text" autocomplete="username" maxlength="20" />
    <label for="passInput">PASSWORD</label>
    <input id="passInput" type="password" autocomplete="current-password" maxlength="64" />
    <button class="action" id="submitBtn">LOGIN</button>
    <div id="loginErr"></div>
  </div>
</div>
<div id="chatOverlay">
  <span id="chatPrompt">SAY:</span>
  <input id="chatInput" type="text" maxlength="200" autocomplete="off" />
</div>
<input id="machineSearch" type="text" placeholder="search ore name..." autocomplete="off" maxlength="32" />
<div id="adminPinOverlay">
  <div id="adminPinCard">
    <h2>ADMIN PIN</h2>
    <div class="sub">restricted area</div>
    <input id="adminPinInput" type="password" inputmode="numeric" autocomplete="off" maxlength="10" />
    <div class="btnRow">
      <button id="adminPinCancel">CANCEL</button>
      <button id="adminPinSubmit" class="go">UNLOCK</button>
    </div>
    <div id="adminPinErr"></div>
  </div>
</div>
<div id="adminSpawnOverlay">
  <h3>SPAWN ORE</h3>
  <div id="adminSpawnInfo">best ores first — select any ore and mutation</div>
  <input id="adminSpawnSearch" type="text" placeholder="filter ores..." maxlength="32" />
  <div id="adminSpawnCount"></div>
  <div id="adminSpawnList"></div>
</div>
<canvas id="game" width="800" height="600"></canvas>
<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = 800, H = 600;
  const FONT = '"Courier New", monospace';

  // fullscreen scaling: keep 4:3 internal resolution, fit to viewport
  function resizeCanvas() {
    const ww = window.innerWidth;
    const wh = window.innerHeight;
    const targetAspect = W / H;
    const winAspect = ww / wh;
    let dispW, dispH;
    if (winAspect > targetAspect) {
      dispH = wh;
      dispW = wh * targetAspect;
    } else {
      dispW = ww;
      dispH = ww / targetAspect;
    }
    canvas.style.width = dispW + 'px';
    canvas.style.height = dispH + 'px';
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ---------- COLOR PALETTE ----------
  const C = {
    // sky
    skyTop: '#0a0a1f',
    skyMid: '#1a1538',
    skyBot: '#3a2a4a',
    moon: '#e8e0c0',
    moonShade: '#a89c70',
    star: '#cccccc',
    starDim: '#605078',

    // mountains
    mtnFar: '#2a2540',
    mtnMid: '#1d1830',
    mtnNear: '#15101e',

    // trees
    treeDark: '#0a1810',
    treeMid: '#15301c',

    // ground
    grassTop: '#3a5a2a',
    grassDark: '#26401e',
    dirtTop: '#5a3a22',
    dirtMid: '#3e2614',
    dirtDeep: '#22140a',

    // base
    baseRoof: '#a83828',
    baseRoofShadow: '#682018',
    baseWall: '#8a5a36',
    baseWallShadow: '#5a3820',
    baseWindow: '#ffdf6f',
    baseWindowFrame: '#3a2010',
    baseDoor: '#3a1f10',

    // shop
    shopRoof: '#3a2858',
    shopWall: '#5a3878',
    shopWallShadow: '#3a2050',
    shopWindow: '#ff80c8',
    shopSign: '#1a0820',
    shopSignText: '#ffe04a',
    shopNeon: '#ff70d0',

    // hole
    holeFrame: '#5a3820',
    holeFrameDark: '#2a1810',
    holeDark: '#000',

    // shaft walls
    wallA: '#3a2818',
    wallB: '#2e1f12',
    wallShadow: '#15100a',
    wallHighlight: '#5a3a22',
    wallSupport: '#6a4828',
    wallSupportDark: '#3a2614',

    // miner
    helmet: '#f0c020',
    helmetShade: '#a88010',
    helmetBand: '#1a1410',
    lamp: '#fff8c0',
    lampGlow: '#ffec70',
    skin: '#e8b888',
    skinShade: '#a87856',
    overalls: '#3858a8',
    overallsShade: '#1f3878',
    shirt: '#d04030',
    boots: '#2a1610',
    pickaxe: '#888',
    pickaxeHandle: '#6a4828',

    // ui
    hudBg: 'rgba(10,5,20,0.78)',
    hudBorder: '#5a3aa0',
    hudBorderDark: '#2a1c5a',
    coin: '#ffd040',
    coinShade: '#aa7820',
    textMain: '#fff',
    textDim: '#aaa8c8',
    textHi: '#7fffa0',
    textWarn: '#ff5a5a',
  };

  // ---------- INPUT ----------
  const keys = {};
  const justPressed = {};
  // Clear all held keys. Called when an overlay grabs/releases focus or the tab
  // loses focus — without this, holding W then opening chat leaves W "stuck"
  // because the input swallows the keyup and the player keeps ascending forever.
  function clearAllKeys() {
    for (const k in keys) keys[k] = false;
  }
  // Tab away / alt-tab: assume nothing is held when focus returns.
  window.addEventListener('blur', clearAllKeys);

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    // If a text input is focused (chat, login, admin pin), let the input handle keys
    // and don't propagate to the game.
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return;
    // T opens chat from any in-game scene
    if (k === 't' && auth.username && !chatOverlay.classList.contains('show')) {
      const okScenes = { surface:1, shaft:1, base:1, shop:1, menu:1, leaderboards:1, dead:1 };
      if (okScenes[game.scene]) { chatOpen(); e.preventDefault(); return; }
    }
    if (!keys[k]) justPressed[k] = true;
    keys[k] = true;
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener('keyup', e => {
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return;
    keys[e.key.toLowerCase()] = false;
  });

  const mouse = {
    x: 0, y: 0,
    down: false,
    clicked: false,        // mousedown edge (used by buttons)
    released: false,       // mouseup edge (used by drag drop)
    releasedAsDrag: false, // true if mouseup followed a drag (moved > threshold)
    downX: 0, downY: 0,
    dragDistance: 0,
    wheelDelta: 0,
  };
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W / r.width);
    mouse.y = (e.clientY - r.top) * (H / r.height);
    if (mouse.down) {
      const dx = mouse.x - mouse.downX;
      const dy = mouse.y - mouse.downY;
      mouse.dragDistance = Math.sqrt(dx * dx + dy * dy);
    }
  });
  canvas.addEventListener('mousedown', e => {
    mouse.down = true; mouse.clicked = true;
    mouse.downX = mouse.x; mouse.downY = mouse.y;
    mouse.dragDistance = 0;
    // If the machine's search input is focused, tapping the canvas should
    // dismiss the on-screen keyboard so bottom buttons (LEAVE) are reachable.
    if (machineSearchInput && document.activeElement === machineSearchInput) {
      machineSearchInput.blur();
    }
  });
  canvas.addEventListener('mouseup', e => {
    mouse.down = false;
    mouse.released = true;
    mouse.releasedAsDrag = mouse.dragDistance > 5;
  });
  canvas.addEventListener('wheel', e => {
    mouse.wheelDelta += e.deltaY;
    if (game.scene === 'base') e.preventDefault();
  }, { passive: false });

  // ---------- TOUCH ----------
  const touch = { mode: false, active: {} };
  const TOUCH_BTN_KEY = { left: 'a', right: 'd', up: 'w', down: 's', grab: ' ' };

  function touchPos(t) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (t.clientX - r.left) * (W / r.width),
      y: (t.clientY - r.top) * (H / r.height),
    };
  }
  function touchButtonAt(x, y) {
    if (!touch.mode) return null;
    if (game.scene !== 'surface' && game.scene !== 'shaft') return null;
    const inR = (rx, ry, rw, rh) => x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
    if (inR(10, H - 90, 70, 70)) return 'left';
    if (inR(90, H - 90, 70, 70)) return 'right';
    if (inR(W - 90, H - 180, 70, 70)) return 'up';
    if (inR(W - 90, H - 90, 70, 70)) return 'down';
    if (inR(W - 170, H - 90, 70, 70)) return 'grab';
    return null;
  }
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touch.mode = true;
    // Dismiss the mobile keyboard if the machine search was focused.
    if (machineSearchInput && document.activeElement === machineSearchInput) {
      machineSearchInput.blur();
    }
    for (const t of e.changedTouches) {
      const pos = touchPos(t);
      const btn = touchButtonAt(pos.x, pos.y);
      touch.active[t.identifier] = { x: pos.x, y: pos.y, button: btn };
      if (btn) {
        const k = TOUCH_BTN_KEY[btn];
        if (!keys[k]) justPressed[k] = true;
        keys[k] = true;
      } else {
        mouse.x = pos.x; mouse.y = pos.y;
        mouse.down = true; mouse.clicked = true;
        mouse.downX = pos.x; mouse.downY = pos.y;
        mouse.dragDistance = 0;
      }
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const pos = touchPos(t);
      const a = touch.active[t.identifier];
      if (!a) continue;
      a.x = pos.x; a.y = pos.y;
      if (!a.button) {
        mouse.x = pos.x; mouse.y = pos.y;
        if (mouse.down) {
          const dx = pos.x - mouse.downX;
          const dy = pos.y - mouse.downY;
          mouse.dragDistance = Math.sqrt(dx * dx + dy * dy);
        }
      }
    }
  }, { passive: false });
  function releaseTouch(id) {
    const a = touch.active[id];
    if (!a) return;
    if (a.button) {
      keys[TOUCH_BTN_KEY[a.button]] = false;
    } else {
      mouse.down = false;
      mouse.released = true;
      mouse.releasedAsDrag = mouse.dragDistance > 5;
    }
    delete touch.active[id];
  }
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) releaseTouch(t.identifier);
  }, { passive: false });
  canvas.addEventListener('touchcancel', e => {
    for (const t of e.changedTouches) releaseTouch(t.identifier);
  });

  function input(name) { return keys[name]; }

  // ---------- AUTH ----------
  const auth = { token: null, username: null, isAdmin: false };

  const loginOverlay = document.getElementById('loginOverlay');
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const userInput = document.getElementById('userInput');
  const passInput = document.getElementById('passInput');
  const submitBtn = document.getElementById('submitBtn');
  const loginErr = document.getElementById('loginErr');
  let authMode = 'login'; // or 'register'

  function setAuthMode(mode) {
    authMode = mode;
    tabLogin.classList.toggle('active', mode === 'login');
    tabRegister.classList.toggle('active', mode === 'register');
    submitBtn.textContent = mode === 'login' ? 'LOGIN' : 'REGISTER';
    passInput.autocomplete = mode === 'login' ? 'current-password' : 'new-password';
    loginErr.textContent = '';
  }
  tabLogin.addEventListener('click', () => setAuthMode('login'));
  tabRegister.addEventListener('click', () => setAuthMode('register'));

  function showLogin() {
    if (typeof clearAllKeys === 'function') clearAllKeys();
    loginOverlay.classList.add('show');
    setTimeout(() => userInput.focus(), 30);
  }
  function hideLogin() {
    loginOverlay.classList.remove('show');
    if (typeof clearAllKeys === 'function') clearAllKeys();
  }

  async function postJson(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    let data = {};
    try { data = await r.json(); } catch (e) {}
    return { ok: r.ok, status: r.status, data };
  }

  async function submitAuth() {
    loginErr.textContent = '';
    const username = userInput.value.trim();
    const password = passInput.value;
    if (!username || !password) {
      loginErr.textContent = 'fill in both fields';
      return;
    }
    submitBtn.disabled = true;
    const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
    const { ok, data } = await postJson(endpoint, { username, password });
    submitBtn.disabled = false;
    if (!ok) {
      loginErr.textContent = data.error || 'something went wrong';
      return;
    }
    auth.token = data.token;
    auth.username = data.username;
    auth.isAdmin = !!data.isAdmin;
    try { localStorage.setItem('depthAuth', JSON.stringify(auth)); } catch (e) {}
    // wipe any leftover client-side economy so we don't briefly show prior data
    resetLocalEconomy();
    hideLogin();
    game.scene = 'menu';
    if (!net.sock) initNetwork();
  }

  // Reset everything the server owns to defaults — game_state will populate real values shortly.
  function resetLocalEconomy() {
    game.money = 40;
    game.weights = 0;
    game.belts = 0;
    game.backpacks = 0;
    game.troveExpansions = 0;
    game.carriedMax = 12;
    game.oxygenMax = 100;
    game.oxygen = 100;
    game.hp = 100;
    game.maxHp = 100;
    game.suffocating = false;
    game.carried = [];
    game.placed = new Array(12).fill(null);
  }
  submitBtn.addEventListener('click', submitAuth);
  [userInput, passInput].forEach(el => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAuth();
    });
  });

  async function tryRestoreSession() {
    let stored = null;
    try { stored = JSON.parse(localStorage.getItem('depthAuth') || 'null'); } catch (e) {}
    if (!stored || !stored.token) { showLogin(); return; }
    const { ok, data } = await postJson('/api/me', { token: stored.token });
    if (ok && data.username) {
      auth.token = stored.token;
      auth.username = data.username;

  // Compact number form: 250k, 10M, 1.5B, 410T, 12Q. Used for money, prices, /s rates.
  function fmtShort(n) {
    if (!isFinite(n)) return '0';
    const abs = Math.abs(n);
    if (abs < 1000) return String(Math.floor(n));
    const units = [
      [1e15, 'Q'],
      [1e12, 'T'],
      [1e9,  'B'],
      [1e6,  'M'],
      [1e3,  'k'],
    ];
    for (const [div, suf] of units) {
      if (abs >= div) {
        const v = n / div;
        let fmt = v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2);
        // Strip ONLY trailing zeros after a decimal point, then any orphan trailing '.'.
        // Earlier this regex stripped trailing zeros from integers too (so "290" -> "29").
        fmt = fmt.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
        return fmt + suf;
      }
    }
    return String(Math.floor(n));
  }

    game.placed = new Array(cap).fill(null);
    for (let i = 0; i < cap && i < pool.length; i++) game.placed[i] = pool[i];
