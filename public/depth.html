    ctx.clip();

    for (let i = 0; i < slotCount; i++) {
      const cx = i % cols;
      const cy = (i / cols) | 0;
      const sx = gridX + cx * (slotSize + gap);
      const sy = gridY + cy * (slotSize + gap) - scrollY;
      // skip if entirely outside viewport
      if (sy + slotSize < gridY - 4 || sy > gridY + viewportH + 4) continue;

      const hovered = mouse.x >= sx && mouse.x <= sx + slotSize &&
                      mouse.y >= sy && mouse.y <= sy + slotSize &&
                      mouse.y >= gridY && mouse.y <= gridY + viewportH;
      const occupied = game.placed[i] !== null;
      const isDropTarget = game.drag && game.drag.source === 'carried' && !occupied;

      // slot background — highlight when valid drop target hovered
      let bgColor = '#1a0e08';
      if (hovered) {
        if (isDropTarget) bgColor = '#4a3a18';
        else if (occupied || game.carried.length > 0) bgColor = '#3a2818';
      }
      ctx.fillStyle = bgColor;
      ctx.fillRect(sx, sy, slotSize, slotSize);
      // inner frame
      ctx.fillStyle = isDropTarget && hovered ? '#ffe080' : '#8a5a30';
      ctx.fillRect(sx, sy, slotSize, 2);
      ctx.fillRect(sx, sy + slotSize - 2, slotSize, 2);
      ctx.fillRect(sx, sy, 2, slotSize);
      ctx.fillRect(sx + slotSize - 2, sy, 2, slotSize);
      ctx.fillStyle = '#5a3818';
      ctx.fillRect(sx + 2, sy + 2, slotSize - 4, 1);
      ctx.fillRect(sx + 2, sy + 2, 1, slotSize - 4);

      const o = game.placed[i];
      const sc = slotSize / 80;
      const showLabels = slotSize >= 60;
      if (o) {
        const ot = ORE_TYPES[o];
        const pedW = Math.round(44 * sc), pedH = Math.round(8 * sc);
        const pedX = sx + Math.round((slotSize - pedW) / 2);
        const pedY = sy + slotSize - Math.round(24 * sc);
        ctx.fillStyle = '#3a2210';
        ctx.fillRect(pedX, pedY, pedW, pedH);
        ctx.fillStyle = '#1a0e08';
        ctx.fillRect(pedX, pedY + pedH, pedW, 2);
        if (ot.glow) {
          const pulse = 0.6 + 0.3 * Math.sin(game.timeAcc * 3 + i);
          ctx.globalAlpha = 0.4 * pulse;
          ctx.fillStyle = ot.glow;
          ctx.fillRect(sx + Math.round(10 * sc), sy + Math.round(16 * sc),
                       Math.round(60 * sc), Math.round(30 * sc));
          ctx.globalAlpha = 1;
        }
        const gemW = Math.max(10, Math.round(24 * sc));
        const gemH = Math.max(8, Math.round(18 * sc));
        const gemX = sx + Math.round((slotSize - gemW) / 2);
        const gemY = sy + Math.round(slotSize * 0.27);
        const edgeT = Math.max(2, Math.round(4 * sc));
        ctx.fillStyle = ot.color;
        ctx.fillRect(gemX, gemY, gemW, gemH);
        ctx.fillStyle = ot.edge;
        ctx.fillRect(gemX, gemY + gemH - edgeT, gemW, edgeT);
        ctx.fillRect(gemX + gemW - edgeT, gemY, edgeT, gemH);
        ctx.fillStyle = ot.spec;
        ctx.fillRect(gemX + 2, gemY + 2, Math.max(3, Math.round(6 * sc)), Math.max(2, Math.round(3 * sc)));
        if (showLabels) {
          pixelText(ot.name, sx + slotSize / 2, sy + slotSize - 12, 9, '#fff', 'center');
          pixelText('+$' + ot.value + '/s', sx + slotSize / 2, sy + slotSize - 22, 8, C.textHi, 'center');
        }
        if (hovered && game.carried.length < game.carriedMax && !game.drag) {
          pixelText('take', sx + slotSize / 2, sy + 4, 9, '#ffe080', 'center');
        }
      } else {
        pixelText('—', sx + slotSize / 2, sy + slotSize / 2 - 4, 14, '#3a2818', 'center');
        if (hovered) {
          if (isDropTarget) {
            pixelText('drop', sx + slotSize / 2, sy + slotSize / 2 + 12, 10, '#ffe080', 'center');
          } else if (game.carried.length > 0 && !game.drag) {
            pixelText('place', sx + slotSize / 2, sy + slotSize / 2 + 12, 9, '#aaa', 'center');
          }
        }
      }

      // mouseup over this slot — handle drop or click
      if (hovered && mouse.released) {
        if (game.drag && game.drag.source === 'carried' && !occupied) {
          // DROP: place dragged ore here, remove from carried
          if (game.drag.idx < game.carried.length && game.carried[game.drag.idx] === game.drag.type) {
            game.placed[i] = game.drag.type;
            game.carried.splice(game.drag.idx, 1);
            sendPlacedSync();
            game.drag = null;
          }
        } else if (!mouse.releasedAsDrag && !game.drag) {
          // single click semantics
          if (occupied && game.carried.length < game.carriedMax) {
            game.carried.push(o);
            game.placed[i] = null;
            sendPlacedSync();
          } else if (!occupied && game.carried.length > 0) {
            const ore = game.carried.shift();
            game.placed[i] = ore;
            sendPlacedSync();
          }
        }
      }
    }
    ctx.restore(); // end clip

    // scrollbar on the right edge of the viewport if scrollable
    if (maxScroll > 0) {
      const sbX = gridX + gridW + 4;
      const sbW = 6;
      ctx.fillStyle = '#1a0e08';
      ctx.fillRect(sbX, gridY, sbW, viewportH);
      const thumbH = Math.max(20, viewportH * (viewportH / contentH));
      const thumbY = gridY + (scrollY / maxScroll) * (viewportH - thumbH);
      ctx.fillStyle = '#8a5a30';
      ctx.fillRect(sbX, thumbY, sbW, thumbH);
      ctx.fillStyle = '#ffe080';
      ctx.fillRect(sbX, thumbY, sbW, 2);
      // tiny arrows for touch users
      ctx.fillStyle = '#3a2414';
      ctx.fillRect(sbX - 16, gridY, 14, 14);
      ctx.fillRect(sbX - 16, gridY + viewportH - 14, 14, 14);
      pixelText('^', sbX - 9, gridY + 1, 12, '#ffe080', 'center');
      pixelText('v', sbX - 9, gridY + viewportH - 13, 12, '#ffe080', 'center');
      // up arrow click
      const upHover = mouse.x >= sbX - 16 && mouse.x <= sbX - 2 &&
                      mouse.y >= gridY && mouse.y <= gridY + 14;
      if (upHover && mouse.clicked) game.troveScrollY = Math.max(0, scrollY - 88);
      // down arrow click
      const dnHover = mouse.x >= sbX - 16 && mouse.x <= sbX - 2 &&
                      mouse.y >= gridY + viewportH - 14 && mouse.y <= gridY + viewportH;
      if (dnHover && mouse.clicked) game.troveScrollY = Math.min(maxScroll, scrollY + 88);
    }

    // Action buttons row above the tray
    if (button(W / 2 - 280, H - 130, 130, 26, 'PLACE BEST')) placeBestOres();
    const sellAllValue = game.carried.reduce((s, t) => s + ORE_TYPES[t].value * SELL_MULT, 0);
    if (button(W / 2 - 140, H - 130, 130, 26, `SELL ALL $${sellAllValue}`, game.carried.length > 0)) {
      sellAllCarried();
    }
    const tCost = trovePrice();
    const tLabel = `+6 SLOTS $${tCost}`;
    if (button(W / 2 + 0, H - 130, 170, 26, tLabel, game.money >= tCost)) {
      buyItem('trove', tCost, () => {
        game.troveExpansions++;
        for (let i = 0; i < 6; i++) game.placed.push(null);
      });
    }
    // current slot count display
    pixelText(`SLOTS: ${placedSlotCount()}`, W / 2 + 180, H - 124, 11, C.textDim);

    // CARRIED tray — drag from here onto a placed slot, or click to sell
    const trayW = Math.max(400, 24 + game.carriedMax * 26);
    const trayX = (W - trayW) / 2;
    panel(trayX, H - 96, trayW, 60);
    pixelText('CARRIED   (drag to slot, or click to sell)', trayX + 8, H - 90, 11, C.textDim);
    const slotsCount = game.carriedMax;
    const usable = trayW - 16;
    const stepW = Math.min(30, Math.floor(usable / slotsCount));
    const slotPix = Math.max(12, stepW - 4);
    for (let i = 0; i < slotsCount; i++) {
      const cx = trayX + 8 + i * stepW;
      const cy = H - 70;
      ctx.fillStyle = '#1a1020';
      ctx.fillRect(cx, cy, slotPix, slotPix);
      ctx.fillStyle = '#3a2a4a';
      ctx.fillRect(cx, cy, slotPix, 1);
      ctx.fillRect(cx, cy, 1, slotPix);
      if (i < game.carried.length) {
        const ore = game.carried[i];
        const iconSize = Math.max(8, slotPix - 4);
        const iconOff = (slotPix - iconSize) / 2;
        // hide icon if this is the source of an active drag (it follows the cursor instead)
        const isDragSrc = game.drag && game.drag.source === 'carried' && game.drag.idx === i;
        if (!isDragSrc) drawOreIcon(cx + iconOff, cy + iconOff, ore, iconSize);
        const hovered = mouse.x >= cx && mouse.x <= cx + slotPix && mouse.y >= cy && mouse.y <= cy + slotPix;
        if (hovered) {
          ctx.fillStyle = 'rgba(255,224,128,0.18)';
          ctx.fillRect(cx, cy, slotPix, slotPix);
          const value = ORE_TYPES[ore].value * SELL_MULT;
          pixelText('$' + value, cx + slotPix / 2, cy - 12, 10, '#ffe080', 'center');
          // mousedown starts a drag (defers sell to mouseup)
          if (mouse.clicked && !game.drag) {
            game.drag = { source: 'carried', idx: i, type: ore };
          }
        }
      }
    }

    // money top-right
    panel(W - 170, 14, 156, 32);
    drawCoin(W - 160, 24, 12);
    pixelText('$' + Math.floor(game.money), W - 140, 22, 14, '#fff');

    if (button(W - 140, H - 30, 120, 26, 'LEAVE [B]')) {
      game.scene = 'surface';
    }
    if (input('b') && justPressed['b'] !== undefined) {
      game.scene = 'surface';
    }

    // resolve a drag that wasn't consumed by a slot drop
    if (mouse.released && game.drag) {
      if (!mouse.releasedAsDrag && game.drag.source === 'carried') {
        // it was a click, not a drag → sell the ore
        sellOreAt(game.drag.idx);
      }
      game.drag = null;
    }

    // draw the dragged ore at cursor position (ghost) — drawn last so it's on top
    if (game.drag && mouse.down) {
      const t = game.drag.type;
      const ot = ORE_TYPES[t];
      if (ot.glow) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = ot.glow;
        ctx.fillRect(mouse.x - 12, mouse.y - 12, 24, 24);
        ctx.globalAlpha = 1;
      }
      drawOreIcon(mouse.x - 8, mouse.y - 8, t, 16);
    }
  }

  // Read-only view of another player's trove
  function drawVisitScreen() {
    ctx.fillStyle = '#1f1822';
    ctx.fillRect(0, 0, W, H);
    // wallpaper stripes (slightly different tint to feel "elsewhere")
    ctx.fillStyle = '#2a1f30';
    for (let x = 0; x < W; x += 24) ctx.fillRect(x, 0, 12, H - 80);
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(0, H - 100, W, 4);
    ctx.fillStyle = '#5a4828';
    ctx.fillRect(0, H - 96, W, 96);
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = '#2a2018';
      ctx.fillRect(0, H - 88 + i * 12, W, 1);
    }

    const v = game.visit;
    pixelText('VISITING', W / 2, 14, 14, C.textDim, 'center');
    pixelText((v.username || '?').toUpperCase() + "'S TROVE", W / 2, 32, 22, '#ffe080', 'center');

    if (v.loading) {
      pixelText('loading...', W / 2, H / 2, 14, '#fff', 'center');
    } else if (v.error || !v.data) {
      pixelText(v.error || 'no data', W / 2, H / 2, 14, '#ff8080', 'center');
    } else {
      pixelText(`income: +$${v.data.passiveIncome || 0}/s`, W / 2, 56, 14, C.textHi, 'center');
      pixelText(`money: $${Math.floor(v.data.money || 0).toLocaleString()}`, W / 2, 74, 12, C.textDim, 'center');

      // mini summary of upgrades
      const stats = [
        `W:${v.data.weights || 0}`,
        `B:${v.data.belts || 0}`,
        `P:${v.data.backpacks || 0}`,
        `T:${v.data.troveExpansions || 0}`,
        `O2:${v.data.oxygenTanks || 0}`,
      ];
      pixelText(stats.join('  ·  '), W / 2, 94, 11, '#aac8ff', 'center');

      // grid of their placed ores
      const placed = Array.isArray(v.data.placedOres) ? v.data.placedOres : [];
      const slotCount = Math.max(12, placed.length);
      const cols = 6;
      const totalRows = Math.ceil(slotCount / cols);
      const gap = 8;
      const slotSize = 80;
      const visibleRows = 3;
      const viewportH = visibleRows * (slotSize + gap) - gap;
      const gridW = cols * (slotSize + gap) - gap;
      const gridX = (W - gridW) / 2;
      const gridY = 120;
      const contentH = totalRows * (slotSize + gap) - gap;
      const maxScroll = Math.max(0, contentH - viewportH);

      if (mouse.x >= gridX - 12 && mouse.x <= gridX + gridW + 12 &&
          mouse.y >= gridY - 10 && mouse.y <= gridY + viewportH + 10 &&
          mouse.wheelDelta !== 0) {
        game.troveScrollY += mouse.wheelDelta;
      }
      game.troveScrollY = Math.max(0, Math.min(maxScroll, game.troveScrollY));
      const scrollY = game.troveScrollY;

      // shelf backing
      ctx.fillStyle = '#5a3a22';
      ctx.fillRect(gridX - 12, gridY - 10, gridW + 24, viewportH + 20);
      ctx.fillStyle = '#3a2414';
      ctx.fillRect(gridX - 12, gridY - 10, gridW + 24, 4);
      ctx.fillRect(gridX - 12, gridY + viewportH + 6, gridW + 24, 4);

      ctx.save();
      ctx.beginPath();
      ctx.rect(gridX - 4, gridY - 4, gridW + 8, viewportH + 8);
      ctx.clip();
      for (let i = 0; i < slotCount; i++) {
        const cx = i % cols, cy = (i / cols) | 0;
        const sx = gridX + cx * (slotSize + gap);
        const sy = gridY + cy * (slotSize + gap) - scrollY;
        if (sy + slotSize < gridY - 4 || sy > gridY + viewportH + 4) continue;
        ctx.fillStyle = '#1a0e08';
        ctx.fillRect(sx, sy, slotSize, slotSize);
        ctx.fillStyle = '#8a5a30';
        ctx.fillRect(sx, sy, slotSize, 2);
        ctx.fillRect(sx, sy + slotSize - 2, slotSize, 2);
        ctx.fillRect(sx, sy, 2, slotSize);
        ctx.fillRect(sx + slotSize - 2, sy, 2, slotSize);
        const o = placed[i];
        if (o && ORE_TYPES[o]) {
          const ot = ORE_TYPES[o];
          ctx.fillStyle = '#3a2210';
          ctx.fillRect(sx + 18, sy + slotSize - 24, 44, 8);
          if (ot.glow) {
            const pulse = 0.6 + 0.3 * Math.sin(game.timeAcc * 3 + i);
            ctx.globalAlpha = 0.4 * pulse;
            ctx.fillStyle = ot.glow;
            ctx.fillRect(sx + 10, sy + 16, 60, 30);
            ctx.globalAlpha = 1;
          }
          ctx.fillStyle = ot.color;
          ctx.fillRect(sx + 28, sy + 22, 24, 18);
          ctx.fillStyle = ot.edge;
          ctx.fillRect(sx + 28, sy + 36, 24, 4);
          ctx.fillRect(sx + 48, sy + 22, 4, 18);
          ctx.fillStyle = ot.spec;
          ctx.fillRect(sx + 30, sy + 24, 6, 3);
          pixelText(ot.name, sx + slotSize / 2, sy + slotSize - 12, 9, '#fff', 'center');
          pixelText('+$' + ot.value + '/s', sx + slotSize / 2, sy + slotSize - 22, 8, C.textHi, 'center');
        } else {
          pixelText('—', sx + slotSize / 2, sy + slotSize / 2 - 4, 14, '#3a2818', 'center');
        }
      }
      ctx.restore();

      if (maxScroll > 0) {
        const sbX = gridX + gridW + 4, sbW = 6;
        ctx.fillStyle = '#1a0e08';
        ctx.fillRect(sbX, gridY, sbW, viewportH);
        const thumbH = Math.max(20, viewportH * (viewportH / contentH));
        const thumbY = gridY + (scrollY / maxScroll) * (viewportH - thumbH);
        ctx.fillStyle = '#8a5a30';
        ctx.fillRect(sbX, thumbY, sbW, thumbH);
      }
    }

    pixelText('read-only — you cannot take or place', W / 2, H - 110, 11, C.textDim, 'center');

    if (button(W / 2 - 80, H - 50, 160, 32, 'LEAVE [B]')) {
      game.visit = null;
      game.scene = 'surface';
    }
    if (input('b')) { game.visit = null; game.scene = 'surface'; }
  }

  function sellOreAt(idx) {
    if (idx < 0 || idx >= game.carried.length) return;
    const ore = game.carried[idx];
    if (isOnline()) {
      net.sock.emit('sell_ores', { ores: [ore] });
    } else {
      game.money += ORE_TYPES[ore].value * SELL_MULT;
    }
    game.carried.splice(idx, 1);
  }

  function sellAllCarried() {
    if (game.carried.length === 0) return;
    const ores = game.carried.slice();
    if (isOnline()) {
      net.sock.emit('sell_ores', { ores });
    } else {
      const total = ores.reduce((s, t) => s + ORE_TYPES[t].value * SELL_MULT, 0);
      game.money += total;
    }
    game.carried = [];
  }

  // ---------- SHOP ----------

    ctx.fillStyle = 'rgba(8,4,16,0.78)';

    const px = 120, py = 60, pw = W - 240, ph = H - 120;

    // 3 items, 76px tall each
    drawShopItem(px + 20, py + 88, pw - 40, 80, {

      stat1: `OWNED: ${game.weights}`,
      stat2: `DESCENT: ${currentDescentSpeed().toFixed(1)} px/s`,
      cost: weightPrice(),

    });

    drawShopItem(px + 20, py + 172, pw - 40, 80, {
      icon: drawBeltIcon,
      title: 'JET BELT',
      desc: 'Boosts ascent speed by 20% (each)',
      stat1: `OWNED: ${game.belts}`,
      stat2: `ASCENT: ${currentAscentSpeed().toFixed(1)} px/s`,
      cost: beltPrice(),
      onBuy: () => buyItem('belt', beltPrice(), () => { game.belts++; }),
    });

    drawShopItem(px + 20, py + 256, pw - 40, 80, {

      stat2: `CARRY: ${game.carriedMax} slots`,
      cost: backpackPrice(),
      onBuy: () => buyItem('backpack', backpackPrice(), () => {
        game.backpacks++;
        game.carriedMax = carriedMaxFrom(game.backpacks);
      }),
    });

    drawShopItem(px + 20, py + 340, pw - 40, 80, {

      stat2: `CURRENT: ${Math.floor(game.oxygen)}`,
      cost: oxygenPrice(),

        game.oxygenMax += 16;
        game.oxygen = game.oxygenMax;

    if (button(W / 2 - 70, py + ph - 56, 140, 38, 'LEAVE [B]')) {
      game.scene = 'surface';
    }
    if (input('b')) game.scene = 'surface';
  }

  // Generic buy: server-authoritative when online, local fallback offline.
  // Server emits game_state which will overwrite local counters anyway, so the local
  // increment is only used when offline.
  function buyItem(serverName, cost, applyLocal) {
    if (isOnline()) {
      net.sock.emit('purchase', { item: serverName });
      return;
    }
    if (game.money < cost) return;
    game.money -= cost;
    applyLocal();
    // oxygen tank also refills locally
    if (serverName === 'oxygen') game.oxygen = game.oxygenMax;
  }

    ctx.fillStyle = '#3a2a14';
    ctx.fillRect(cx - 14, cy + 10, 28, 2);

    ctx.fillRect(cx - 14, cy - 14, 28, 8);
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(cx - 14, cy - 7, 28, 1);
    // strap loop
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(cx - 16, cy - 6, 2, 14);
    ctx.fillRect(cx + 14, cy - 6, 2, 14);
    // buckle
    ctx.fillStyle = '#ffe080';
    ctx.fillRect(cx - 3, cy + 2, 6, 4);
    ctx.fillStyle = '#aa8020';
    ctx.fillRect(cx - 3, cy + 4, 6, 2);

    ctx.fillStyle = '#4a2e1c';
    ctx.fillRect(cx - 10, cy - 2, 20, 8);
    ctx.fillStyle = '#3a2010';

    ctx.fillStyle = '#5a3a22';

    ctx.fillStyle = '#ffe080';
    ctx.fillRect(cx - 4, cy - 5, 8, 10);
    ctx.fillStyle = '#aa8020';

    ctx.fillRect(cx - 14, cy + 7, 6, 1);

  function drawShopItem(x, y, w, h, item) {
    // item bg
    ctx.fillStyle = '#0e0820';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#3a1c5a';
    ctx.fillRect(x, y, w, 2);
    ctx.fillRect(x, y + h - 2, w, 2);
    ctx.fillRect(x, y, 2, h);
    ctx.fillRect(x + w - 2, y, 2, h);

    // icon panel
    ctx.fillStyle = '#1a1030';
    ctx.fillRect(x + 8, y + 8, 64, h - 16);
    ctx.fillStyle = '#5a3aa0';
    ctx.fillRect(x + 8, y + 8, 64, 1);
    ctx.fillRect(x + 8, y + 8, 1, h - 16);
    item.icon(x + 40, y + h / 2);

    // text
    pixelText(item.title, x + 84, y + 14, 16, '#fff');
    pixelText(item.desc, x + 84, y + 36, 11, C.textDim);
    pixelText(item.stat1, x + 84, y + 54, 11, '#aac8ff');
    pixelText(item.stat2, x + 84, y + 68, 11, '#aac8ff');

    // buy button
    const canBuy = game.money >= item.cost;
    if (button(x + w - 140, y + h / 2 - 18, 124, 38, `BUY  $${item.cost}`, canBuy)) {
      item.onBuy();
    }
  }

  function drawWeightIcon(cx, cy) {
    // iron weight (kettlebell style)
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(cx - 4, cy - 18, 8, 4);
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(cx - 6, cy - 16, 12, 2);
    // body
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(cx - 14, cy - 12, 28, 22);
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(cx - 14, cy - 12, 28, 3);
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(cx - 14, cy + 8, 28, 2);
    // weight mark
    pixelText('W', cx, cy - 6, 16, '#fff', 'center', false);
  }

  function drawO2Icon(cx, cy) {
    // oxygen tank
    ctx.fillStyle = '#5fdc5f';
    ctx.fillRect(cx - 8, cy - 16, 16, 28);
    ctx.fillStyle = '#3a9a3a';
    ctx.fillRect(cx - 8, cy + 6, 16, 6);
    ctx.fillRect(cx + 4, cy - 16, 4, 28);
    // top valve
    ctx.fillStyle = '#888';
    ctx.fillRect(cx - 4, cy - 20, 8, 4);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(cx - 2, cy - 24, 4, 4);
    // label
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 6, cy - 8, 12, 6);
    pixelText('O2', cx, cy - 7, 8, '#000', 'center', false);
  }

  // ---------- TITLE SCREEN ----------
  // ---------- BOOT (waiting for auth check) ----------
  function drawBoot() {
    ctx.fillStyle = '#06030c';
    ctx.fillRect(0, 0, W, H);
    pixelText('DEPTH', W / 2, H / 2 - 40, 48, '#ffe080', 'center');
    const dots = '.'.repeat(1 + (Math.floor(game.timeAcc * 3) % 3));
    pixelText('loading' + dots, W / 2, H / 2 + 20, 14, '#aaa8c8', 'center');
  }

  // ---------- MAIN MENU (after login) ----------
  function drawMenu() {
    // background — reuse the title aesthetic
    ctx.fillStyle = '#0a0820';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 5; i++) {
      const c = ['#0a0820', '#15123a', '#26204a', '#3a2c5a', '#5a3a6a'][i];
      ctx.fillStyle = c;
      ctx.fillRect(0, i * 60, W, 60);
    }
    // moon
    ctx.fillStyle = C.moon;
    ctx.fillRect(120, 60, 50, 50);
    ctx.fillStyle = C.moonShade;
    ctx.fillRect(130, 70, 10, 6);
    ctx.fillRect(146, 90, 12, 6);
    for (let i = 0; i < 80; i++) {
      const sx = (i * 137) % W;
      const sy = (i * 53) % 280;
      const twinkle = ((Math.floor(game.timeAcc * 3) + i) % 5 === 0);
      ctx.fillStyle = twinkle ? '#fff' : '#5a5078';
      ctx.fillRect(sx, sy, twinkle ? 2 : 1, twinkle ? 2 : 1);
    }
    drawMountains(0, 320, C.mtnFar, 0);
    drawMountains(0, 360, C.mtnMid, 0);
    drawMountains(0, 400, C.mtnNear, 0);
    ctx.fillStyle = C.dirtMid;
    ctx.fillRect(0, 440, W, H - 440);
    ctx.fillStyle = C.grassTop;
    ctx.fillRect(0, 440, W, 6);

    // title
    pixelText('DEPTH', W / 2 + 4, 84, 80, '#1a0820', 'center');
    pixelText('DEPTH', W / 2, 80, 80, '#ffe080', 'center');
    ctx.fillStyle = '#a880ff';
    ctx.fillRect(W / 2 - 120, 168, 240, 3);
    ctx.fillStyle = '#5a3aa0';
    ctx.fillRect(W / 2 - 120, 171, 240, 2);

    // welcome
    pixelText('welcome,', W / 2, 196, 12, C.textDim, 'center');
    pixelText(auth.username || 'miner', W / 2, 214, 20, '#fff', 'center');

    // buttons
    if (button(W / 2 - 130, 250, 260, 50, 'START GAME')) {
      game.scene = 'title';
    }
    if (button(W / 2 - 130, 308, 260, 36, 'LEADERBOARDS')) {
      openLeaderboards();
    }
    if (button(W / 2 - 130, 350, 260, 36, 'LOGOUT')) {
      logout();
    }
    if (auth.isAdmin) {
      if (button(W / 2 - 130, 392, 260, 32, '⚡ FORCE RELOAD ALL ⚡')) {
        adminForceReload();
      }
    }

    // online count
    if (net.connected) {
      const count = 1 + Object.keys(net.remotePlayers).length;
      pixelText(`. ${count} ONLINE`, W / 2, 432, 12, '#7fdc7f', 'center');
    } else {
      pixelText('connecting...', W / 2, 432, 12, C.textDim, 'center');
    }

    // miner walking
    const mx = ((game.timeAcc * 40) % (W + 60)) - 30;
    drawMiner(mx, 408, {
      walkPhase: game.timeAcc * 8,
      facing: 1,
      mode: 'surface',
    });

    pixelText('[SPACE] start  ·  [L] logout', W / 2, H - 30, 11, C.textDim, 'center');

    if (input(' ') && game.timeAcc > 0.5) game.scene = 'title';
    if (justPressed['l']) logout();
  }

  // ---------- LEADERBOARDS ----------
  let leaderboardCache = null;
  let leaderboardTab = 'money';
  let leaderboardLoading = false;
  async function openLeaderboards() {
    game.scene = 'leaderboards';
    leaderboardLoading = true;
    try {
      const r = await fetch('/api/leaderboards');
      leaderboardCache = await r.json();
    } catch (e) { leaderboardCache = null; }
    leaderboardLoading = false;
  }

  function drawLeaderboards() {
    ctx.fillStyle = '#0a0820';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = ['#0a0820', '#15123a', '#26204a', '#3a2c5a', '#5a3a6a'][i];
      ctx.fillRect(0, i * 60, W, 60);
    }
    pixelText('LEADERBOARDS', W / 2, 40, 36, '#ffe080', 'center');

    const tabs = [
      { key: 'money',           label: 'MONEY'    },
      { key: 'weights',         label: 'WEIGHTS'  },
      { key: 'belts',           label: 'BELTS'    },
      { key: 'backpacks',       label: 'BACKPACK' },
      { key: 'troveExpansions', label: 'TROVE'    },
      { key: 'oxygenTanks',     label: 'OXYGEN'   },
    ];
    const tabW = 110, tabH = 30, tabY = 90;
    const tabsTotalW = tabs.length * (tabW + 4) - 4;
    const tabsX0 = (W - tabsTotalW) / 2;
    for (let i = 0; i < tabs.length; i++) {
      const x = tabsX0 + i * (tabW + 4);
      const active = leaderboardTab === tabs[i].key;
      ctx.fillStyle = active ? '#3a1c5a' : '#1a1430';
      ctx.fillRect(x, tabY, tabW, tabH);
      ctx.fillStyle = active ? '#a880ff' : '#5a3aa0';
      ctx.fillRect(x, tabY, tabW, 2);
      ctx.fillRect(x, tabY + tabH - 2, tabW, 2);
      pixelText(tabs[i].label, x + tabW / 2, tabY + 9, 11, active ? '#ffe080' : '#aaa', 'center');
      if (mouse.x >= x && mouse.x <= x + tabW && mouse.y >= tabY && mouse.y <= tabY + tabH && mouse.clicked) {
        leaderboardTab = tabs[i].key;
      }
    }

    const listX = W / 2 - 200, listY = 140, listW = 400, listH = 360;
    panel(listX, listY, listW, listH);
    if (leaderboardLoading) {
      pixelText('loading...', W / 2, listY + 30, 14, C.textDim, 'center');
    } else if (!leaderboardCache || !leaderboardCache[leaderboardTab]) {
      pixelText('no data', W / 2, listY + 30, 14, C.textDim, 'center');
    } else {
      const entries = leaderboardCache[leaderboardTab];
      if (entries.length === 0) {
        pixelText('no entries yet', W / 2, listY + 30, 14, C.textDim, 'center');
      }
      for (let i = 0; i < entries.length && i < 10; i++) {
        const e = entries[i];
        const row = listY + 14 + i * 32;
        const isMe = auth.username && e.name.toLowerCase() === auth.username.toLowerCase();
        ctx.fillStyle = isMe ? '#3a2c5a' : '#1a1020';
        ctx.fillRect(listX + 8, row, listW - 16, 28);
        ctx.fillStyle = i === 0 ? '#ffe080' : i === 1 ? '#c0c0c0' : i === 2 ? '#cc8050' : '#aaa';
        pixelText('#' + (i + 1), listX + 20, row + 8, 14, ctx.fillStyle);
        pixelText(e.name, listX + 60, row + 8, 13, isMe ? '#ffffff' : '#fff');
        const valStr = leaderboardTab === 'money' ? '$' + Math.floor(e.value).toLocaleString() : String(e.value);
        pixelText(valStr, listX + listW - 16, row + 8, 13, C.textHi, 'right');
      }
    }

    if (button(W / 2 - 80, H - 50, 160, 32, 'BACK [B]')) {
      game.scene = 'menu';
    }
    if (justPressed['b']) game.scene = 'menu';
  }

  async function openVisit(username) {
    game.visit = { username, loading: true, data: null };
    game.scene = 'base';
    try {
      const r = await fetch('/api/visit?user=' + encodeURIComponent(username));
      if (r.ok) {
        game.visit.data = await r.json();
      } else {
        game.visit.error = 'could not load';
      }
    } catch (e) {
      game.visit.error = 'network error';
    }
    if (game.visit) game.visit.loading = false;
  }

  async function adminForceReload() {
    if (!auth.isAdmin || !auth.token) return;
    if (!confirm('Force ALL players to reload? This may interrupt their game.')) return;
    try {
      await fetch('/api/admin/force_reload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: auth.token }),
      });
    } catch (e) { console.error(e); }
  }

  function drawTitle() {
    // animated bg
    ctx.fillStyle = '#0a0820';
    ctx.fillRect(0, 0, W, H);
    // sky
    for (let i = 0; i < 5; i++) {
      const c = ['#0a0820', '#15123a', '#26204a', '#3a2c5a', '#5a3a6a'][i];
      ctx.fillStyle = c;
      ctx.fillRect(0, i * 60, W, 60);
    }
    // moon
    ctx.fillStyle = C.moon;
    ctx.fillRect(120, 60, 50, 50);
    ctx.fillStyle = C.moonShade;
    ctx.fillRect(130, 70, 10, 6);
    ctx.fillRect(146, 90, 12, 6);
    // stars
    for (let i = 0; i < 80; i++) {
      const sx = (i * 137) % W;
      const sy = (i * 53) % 280;
      const twinkle = ((Math.floor(game.timeAcc * 3) + i) % 5 === 0);
      ctx.fillStyle = twinkle ? '#fff' : '#5a5078';
      ctx.fillRect(sx, sy, twinkle ? 2 : 1, twinkle ? 2 : 1);
    }
    // mountains
    drawMountains(0, 320, C.mtnFar, 0);
    drawMountains(0, 360, C.mtnMid, 0);
    drawMountains(0, 400, C.mtnNear, 0);
    // ground
    ctx.fillStyle = C.dirtMid;
    ctx.fillRect(0, 440, W, H - 440);
    ctx.fillStyle = C.grassTop;
    ctx.fillRect(0, 440, W, 6);

    // title with big chunky letters
    const titleY = 130;
    // shadow
    pixelText('DEPTH', W / 2 + 4, titleY + 4, 96, '#1a0820', 'center', false);
    // main
    pixelText('DEPTH', W / 2, titleY, 96, '#ffe080', 'center', false);
    // underline glow
    ctx.fillStyle = '#a880ff';
    ctx.fillRect(W / 2 - 140, titleY + 96, 280, 3);
    ctx.fillStyle = '#5a3aa0';
    ctx.fillRect(W / 2 - 140, titleY + 99, 280, 2);
    pixelText('a mining descent', W / 2, titleY + 108, 16, C.textDim, 'center');

    // press start (blinking)
    if ((Math.floor(game.timeAcc * 2) % 2) === 0) {
      pixelText('press [SPACE] to dig in', W / 2, 380, 16, '#fff', 'center');
    }
    pixelText('WASD or arrows to move    W to enter, S to descend', W / 2, 420, 11, C.textDim, 'center');

    // mini miner walking across grass
    const mx = ((game.timeAcc * 40) % (W + 60)) - 30;
    drawMiner(mx, 408, {
      walkPhase: game.timeAcc * 8,
      facing: 1,
      mode: 'surface',
    });

    // credits
    pixelText('use the SHOP to buy weights and oxygen', W / 2, H - 56, 11, C.textDim, 'center');
    pixelText('place ores in the BASE to earn passive $', W / 2, H - 40, 11, C.textDim, 'center');

    if ((input(' ') || mouse.clicked) && game.timeAcc > 0.5) {
      game.scene = 'surface';
    }
  }

  // ---------- DEATH ----------
  function drawDeathScreen() {
    drawShaft();
    ctx.fillStyle = 'rgba(20,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    // vignette
    const grd = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 500);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, 'rgba(0,0,0,0.9)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    panel(W / 2 - 220, H / 2 - 110, 440, 220, '#1a0810', '#ff4040', '#7a1010');
    pixelText('YOU DIED', W / 2, H / 2 - 88, 44, '#ff4040', 'center');
    pixelText('all carried ores were lost', W / 2, H / 2 - 36, 14, '#fff', 'center');
    pixelText(`depth reached: ${Math.floor(game.maxDepth)}m`, W / 2, H / 2 - 14, 12, C.textDim, 'center');
    pixelText(`income kept: +$${passiveIncome()}/s`, W / 2, H / 2 + 4, 12, C.textHi, 'center');
    if (button(W / 2 - 90, H / 2 + 36, 180, 48, 'TRY AGAIN')) {
      game.player.limp = 0;
      exitShaftToSurface();
    }
  }

  // ---------- MAIN LOOP ----------
  const DT = 1 / 20;
  let passiveAcc = 0;

  function update() {
    game.timeAcc += DT;

    passiveAcc += DT;
    if (passiveAcc >= 1) {
      const ticks = Math.floor(passiveAcc);
      passiveAcc -= ticks;
      game.money += passiveIncome() * ticks;
    }

    if (game.scene === 'surface') updateSurface(DT);
    else if (game.scene === 'shaft') updateShaft(DT);

    // drop any pending drag if we leave the base scene
    if (game.scene !== 'base' && game.drag) game.drag = null;
    if (game.scene !== 'base' && game.visit) game.visit = null;

    updateParticles();

    if (game.screenShake > 0) game.screenShake--;

    for (const k in justPressed) delete justPressed[k];
  }

  function draw() {
    ctx.save();
    if (game.screenShake > 0) {
      ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
    }
    ctx.clearRect(0, 0, W, H);
    if (game.scene === 'boot') drawBoot();
    else if (game.scene === 'menu') drawMenu();
    else if (game.scene === 'leaderboards') drawLeaderboards();
    else if (game.scene === 'title') drawTitle();
    else if (game.scene === 'surface') drawSurface();
    else if (game.scene === 'shaft') drawShaft();
    else if (game.scene === 'base') drawBaseScreen();
    else if (game.scene === 'shop') drawShopScreen();
    else if (game.scene === 'dead') drawDeathScreen();
    ctx.restore();

    // scanlines overlay for arcade feel
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#000';
    for (let y = 0; y < H; y += 2) {
      ctx.fillRect(0, y, W, 1);
    }
    ctx.globalAlpha = 1;

    // vignette
    const vg = ctx.createRadialGradient(W / 2, H / 2, 250, W / 2, H / 2, 500);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    drawTouchButtons();
    drawDepthBar();
  }

  function drawTouchButtons() {
    if (!touch.mode) return;
    if (game.scene !== 'surface' && game.scene !== 'shaft') return;
    const drawBtn = (x, y, w, h, label, key, big = false) => {
      const pressed = keys[key];
      ctx.fillStyle = pressed ? 'rgba(80,60,160,0.75)' : 'rgba(20,15,40,0.55)';
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = pressed ? '#c0a0ff' : '#5a3aa0';
      ctx.fillRect(x, y, w, 3);
      ctx.fillRect(x, y + h - 3, w, 3);
      ctx.fillRect(x, y, 3, h);
      ctx.fillRect(x + w - 3, y, 3, h);
      pixelText(label, x + w / 2, y + h / 2 - (big ? 8 : 10), big ? 16 : 22, '#fff', 'center');
    };
    drawBtn(10, H - 90, 70, 70, '<', 'a');
    drawBtn(90, H - 90, 70, 70, '>', 'd');
    drawBtn(W - 90, H - 180, 70, 70, '^', 'w');
    drawBtn(W - 90, H - 90, 70, 70, 'v', 's');
    drawBtn(W - 170, H - 90, 70, 70, 'GRAB', ' ', true);
  }

  // depth bar on the right edge — log scale so deep tiers stay visible
  function drawDepthBar() {
    if (game.scene !== 'surface' && game.scene !== 'shaft') return;
    const MAX_D = 80000;
    const barX = W - 22, barY = 74, barW = 14, barH = H - 156;
    const dToY = (d) => {
      if (d <= 0) return barY;
      const t = Math.log(d + 1) / Math.log(MAX_D + 1);
      return barY + Math.min(1, t) * barH;
    };
    // bg panel
    panel(barX - 4, barY - 16, barW + 8, barH + 32);
    pixelText('DEPTH', barX + barW / 2, barY - 13, 9, '#fff', 'center');
    // gradient inside (surface = brown, deep = black)
    for (let i = 0; i < barH; i++) {
      const t = i / barH;
      const r = Math.round(58 * (1 - t));
      const g = Math.round(40 * (1 - t));
      const b = Math.round(28 * (1 - t));
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(barX, barY + i, barW, 1);
    }
    // markers for milestone depths
    const marks = [200, 1400, 5400, 11900, 29000, 72000];
    for (const m of marks) {
      const my = dToY(m);
      ctx.fillStyle = '#5a3a22';
      ctx.fillRect(barX - 3, my, barW + 6, 1);
      pixelText(m >= 1000 ? (m / 1000).toFixed(1) + 'k' : String(m),
                barX - 6, my - 5, 7, '#aaa', 'right');
    }
    // remote players
    for (const sid in net.remotePlayers) {
      const rp = net.remotePlayers[sid];
      if (!rp) continue;
      const d = rp.depth || 0;
      const ry = dToY(d);
      const pal = paletteFor(sid);
      ctx.fillStyle = pal.helmet;
      ctx.fillRect(barX - 1, ry - 1, barW + 2, 3);
    }
    // own marker (always shown — surface = top)
    const myD = game.scene === 'shaft' ? game.depth : 0;
    const myY = dToY(myD);
    ctx.fillStyle = '#fff';
    ctx.fillRect(barX - 4, myY - 3, barW + 8, 6);
    ctx.fillStyle = C.helmet;
    ctx.fillRect(barX - 3, myY - 2, barW + 6, 4);
  }

  // gate: check existing session before booting; tryRestoreSession will move scene
  // to 'menu' (and call initNetwork) on success, or show the login overlay on failure
  tryRestoreSession();

  setInterval(() => {
    update();
    sendUpdate();
    draw();
    mouse.clicked = false;
    mouse.released = false;
    mouse.releasedAsDrag = false;
    mouse.wheelDelta = 0;
  }, 1000 / 20);

})();
</script>
</body>
</html>
