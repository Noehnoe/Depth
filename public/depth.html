  // Determine what an input array would convert into.
  // Rules:
  //   2 same normal-quality → 1 gold of that ore (prefix 'g_')
  //   2 same gold-quality   → 1 diamond of that ore (prefix 'd_')
  //   3 same diamond-quality → 1 rainbow of that ore (prefix 'r_')
  function conversionResult(types) {
    if (!Array.isArray(types) || types.length < 2) return null;
    const first = types[0];
    if (!ORE_TYPES[first]) return null;
    // all must match exactly
    for (let i = 1; i < types.length; i++) if (types[i] !== first) return null;
    const ot = ORE_TYPES[first];
    const baseType = ot.baseType;
    const q = ot.quality;
    if (q === 'normal' && types.length === 2) return 'g_' + baseType;
    if (q === 'gold'   && types.length === 2) return 'd_' + baseType;
    if (q === 'diamond' && types.length === 3) return 'r_' + baseType;
    return null;
  }

  function machineAddInput(from, idx) {
    if (!game.machine) return;
    // refuse duplicate sources so a single slot can't be added twice
    for (const s of game.machine.source) {
      if (s.from === from && s.idx === idx) return;
    }
    let type = null;
    if (from === 'carried') type = game.carried[idx];
    else if (from === 'placed') type = game.placed[idx];
    if (!type) return;
    if (game.machine.input.length >= 3) return;
    game.machine.input.push(type);
    game.machine.source.push({ from, idx });
  }

  function machineRemoveInput(slot) {
    if (!game.machine) return;
    game.machine.input.splice(slot, 1);
    game.machine.source.splice(slot, 1);
  }

  function machineConvert() {
    if (!game.machine) return;
    const result = conversionResult(game.machine.input);
    if (!result) return;
    // Consume sources (highest indices first so splices don't shift things)
    const carriedRemove = [];
    const placedNullify = [];
    for (const s of game.machine.source) {
      if (s.from === 'carried') carriedRemove.push(s.idx);
      else placedNullify.push(s.idx);
    }
    carriedRemove.sort((a, b) => b - a);
    for (const i of carriedRemove) game.carried.splice(i, 1);
    for (const i of placedNullify) game.placed[i] = null;
    // Put result in carried (or first empty placed if carried is full)
    if (game.carried.length < game.carriedMax) {
      game.carried.push(result);
    } else {
      const slot = game.placed.findIndex(o => o === null);
      if (slot !== -1) game.placed[slot] = result;
      else game.carried.push(result); // overflow — accept beyond cap
    }
    sendPlacedSync();
    // reset machine staging
    game.machine.input = [];
    game.machine.source = [];
    // toast
    showCollectToast(`Converted: 1x ${ORE_TYPES[result].name} (${fmtShort(ORE_TYPES[result].value)}/s)`);
  }

  // Upgrades every ore you own to the highest quality possible.
  // For each base type: 2 normal -> 1 gold, 2 gold -> 1 diamond, 3 diamond -> 1 rainbow.
  // Existing higher-quality ores are added to the pool before each step, so leftover
  // normals can combine with existing golds, etc.
  function machineConvertAll() {
    // Tally everything by base type + quality
    const counts = {};
    function tally(type) {
      const ot = ORE_TYPES[type];
      if (!ot) return;
      counts[ot.baseType] = counts[ot.baseType] || { normal: 0, gold: 0, diamond: 0, rainbow: 0 };
      counts[ot.baseType][ot.quality]++;
    }
    for (const t of game.carried) tally(t);
    for (const t of game.placed) if (t) tally(t);

    if (Object.keys(counts).length === 0) {
      showCollectToast('Convert All: you have no ores');
      return;
    }
    if (!confirm('Convert ALL your ores up the chain to the highest quality possible?\n\nUses everything in your hotbar AND your trove.')) return;

    let goldMade = 0, diamondMade = 0, rainbowMade = 0;
    const newOres = [];
    for (const base in counts) {
      let { normal, gold, diamond, rainbow } = counts[base];
      // normal -> gold
      const ngs = Math.floor(normal / 2);
      gold += ngs; goldMade += ngs;
      normal = normal % 2;
      // gold -> diamond
      const nds = Math.floor(gold / 2);
      diamond += nds; diamondMade += nds;
      gold = gold % 2;
      // diamond -> rainbow
      const nrs = Math.floor(diamond / 3);
      rainbow += nrs; rainbowMade += nrs;
      diamond = diamond % 3;
      // emit remaining ores
      for (let i = 0; i < normal;  i++) newOres.push(base);
      for (let i = 0; i < gold;    i++) newOres.push('g_' + base);
      for (let i = 0; i < diamond; i++) newOres.push('d_' + base);
      for (let i = 0; i < rainbow; i++) newOres.push('r_' + base);
    }

    // Rebuild inventory: highest-value ores fill placed first (max passive income),
    // rest go in carried. Conversion always shrinks total, so overflow is rare.
    newOres.sort((a, b) => ORE_TYPES[b].value - ORE_TYPES[a].value);
    const cap = placedSlotCount();
    game.placed = new Array(cap).fill(null);
    for (let i = 0; i < Math.min(cap, newOres.length); i++) game.placed[i] = newOres[i];
    const leftover = newOres.slice(cap);
    game.carried = leftover.slice(0, Math.max(game.carriedMax, leftover.length));

    sendPlacedSync();
    game.machine.input = [];
    game.machine.source = [];

    const parts = [];
    if (rainbowMade > 0) parts.push(`${rainbowMade}x rainbow`);
    if (diamondMade > 0) parts.push(`${diamondMade}x diamond`);
    if (goldMade > 0) parts.push(`${goldMade}x gold`);
    showCollectToast(parts.length > 0 ? `Convert All: made ${parts.join(', ')}` : 'Convert All: nothing could combine');
  }


  function drawMachineScreen() {
    // dark industrial background
    ctx.fillStyle = '#181820';
    ctx.fillRect(0, 0, W, H);
    // floor / wall divide
    ctx.fillStyle = '#222230';
    ctx.fillRect(0, 0, W, H - 100);
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(0, H - 100, W, 100);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(0, H - 100, W, 4);
    // panel pattern
    for (let x = 0; x < W; x += 32) {
      ctx.fillStyle = (x / 32) % 2 ? '#262632' : '#222230';
      ctx.fillRect(x, 0, 32, H - 100);
    }
    // glowing panel lights
    for (let i = 0; i < 6; i++) {
      const lx = 40 + i * 130;
      const ly = 30 + Math.sin(game.timeAcc * 2 + i) * 1;
      ctx.fillStyle = `rgba(120,200,255,${0.4 + 0.3 * Math.sin(game.timeAcc * 3 + i)})`;
      ctx.fillRect(lx, ly, 4, 4);
    }
    pixelText('CONVERSION MACHINE', W / 2, 14, 22, '#80c0ff', 'center');
    pixelText('combine identical ores to upgrade them', W / 2, 42, 11, C.textDim, 'center');

    // Recipes reminder
    pixelText('2x normal -> 1x GOLD (1.25x)    2x GOLD -> 1x DIAMOND (2x)    3x DIAMOND -> 1x RAINBOW (10x)',
      W / 2, 60, 10, '#aac8ff', 'center');

    // INPUT slots (3)
    const slotSize = 64, slotY = 90, gap = 12;
    const inSlotsX = W / 2 - (3 * slotSize + 2 * gap) / 2;
    pixelText('INPUTS', W / 2 - 200, slotY - 18, 12, '#fff');
    for (let i = 0; i < 3; i++) {
      const sx = inSlotsX + i * (slotSize + gap);
      const sy = slotY;
      ctx.fillStyle = '#1a1a24';
      ctx.fillRect(sx, sy, slotSize, slotSize);
      ctx.strokeStyle = '#80c0ff';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 0.5, sy + 0.5, slotSize - 1, slotSize - 1);
      const t = game.machine && game.machine.input[i];
      if (t) {
        const ot = ORE_TYPES[t];
        if (ot.glow) {
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = ot.glow;
          ctx.fillRect(sx + 8, sy + 8, slotSize - 16, slotSize - 16);
          ctx.globalAlpha = 1;
        }
        ctx.fillStyle = ot.color;
        ctx.fillRect(sx + slotSize / 2 - 10, sy + slotSize / 2 - 8, 20, 16);
        ctx.fillStyle = ot.edge;
        ctx.fillRect(sx + slotSize / 2 - 10, sy + slotSize / 2 + 5, 20, 3);
        pixelText(ot.name, sx + slotSize / 2, sy + slotSize - 10, 7, '#fff', 'center');
        const hover = mouse.x >= sx && mouse.x <= sx + slotSize && mouse.y >= sy && mouse.y <= sy + slotSize;
        if (hover) {
          ctx.fillStyle = 'rgba(255,128,128,0.18)';
          ctx.fillRect(sx, sy, slotSize, slotSize);
          pixelText('remove', sx + slotSize / 2, sy - 12, 9, '#ff8080', 'center');
          if (mouse.clicked) machineRemoveInput(i);
        }
      } else {
        pixelText('empty', sx + slotSize / 2, sy + slotSize / 2 - 4, 10, '#444', 'center');
      }
    }

    // result preview
    const result = game.machine ? conversionResult(game.machine.input) : null;
    const arrowX = inSlotsX + 3 * slotSize + 3 * gap + 30;
    const resX = arrowX + 40;
    pixelText('->', arrowX, slotY + 26, 18, result ? '#80c0ff' : '#3a3a48', 'center');
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(resX, slotY, slotSize, slotSize);
    ctx.strokeStyle = result ? '#ffe080' : '#3a3a48';
    ctx.strokeRect(resX + 0.5, slotY + 0.5, slotSize - 1, slotSize - 1);
    if (result && ORE_TYPES[result]) {
      const ot = ORE_TYPES[result];
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = ot.glow || ot.color;
      ctx.fillRect(resX + 4, slotY + 4, slotSize - 8, slotSize - 8);
      ctx.globalAlpha = 1;
      ctx.fillStyle = ot.color;
      ctx.fillRect(resX + slotSize / 2 - 10, slotY + slotSize / 2 - 8, 20, 16);
      ctx.fillStyle = ot.edge;
      ctx.fillRect(resX + slotSize / 2 - 10, slotY + slotSize / 2 + 5, 20, 3);
      pixelText(ot.name, resX + slotSize / 2, slotY + slotSize - 10, 8, '#fff', 'center');
    }

    // convert button
    const canConvert = !!result;
    if (button(resX + slotSize + 14, slotY + 18, 130, 32, 'CONVERT', canConvert)) {
      machineConvert();
    }
    if (button(resX + slotSize + 14, slotY + 56, 130, 22, 'CLEAR', game.machine && game.machine.input.length > 0)) {
      game.machine.input = [];
      game.machine.source = [];
    }

    // SEARCH + FILTER bar (search input is an HTML element overlaid at (40, 200, 280, 28))
    pixelText('YOUR ORES (click to add)', W / 2, 184, 12, '#fff', 'center');
    // search bar background (the HTML <input> sits on top of this)
    pixelText('SEARCH:', 50, 207, 11, C.textDim);
    // ensure HTML input is visible + positioned
    if (!machineSearchInput.classList.contains('show')) {
      machineSearchInput.classList.add('show');
      positionMachineSearch();
    }

    // quality filter buttons
    const filters = [
      { key: 'normal',  label: 'REGULAR',  color: '#cccccc' },
      { key: 'gold',    label: 'GOLD',     color: '#fff080' },
      { key: 'diamond', label: 'DIAMOND',  color: '#80f8ff' },
      { key: 'rainbow', label: 'RAINBOW',  color: '#ff80ff' },
    ];
    const fX = 340, fY = 200, fW = 100, fH = 28, fGap = 6;
    for (let i = 0; i < filters.length; i++) {
      const f = filters[i];
      const bx = fX + i * (fW + fGap);
      const active = game.machine.filter === f.key;
      ctx.fillStyle = active ? '#3a2a18' : '#1a1a24';
      ctx.fillRect(bx, fY, fW, fH);
      ctx.fillStyle = active ? f.color : '#3a3a48';
      ctx.fillRect(bx, fY, fW, 2);
      ctx.fillRect(bx, fY + fH - 2, fW, 2);
      ctx.fillRect(bx, fY, 2, fH);
      ctx.fillRect(bx + fW - 2, fY, 2, fH);
      pixelText(f.label, bx + fW / 2, fY + 9, 11, active ? f.color : '#aaa', 'center');
      const hov = mouse.x >= bx && mouse.x <= bx + fW && mouse.y >= fY && mouse.y <= fY + fH;
      if (hov && mouse.clicked) {
        game.machine.filter = (game.machine.filter === f.key) ? null : f.key;
      }
    }

    // helper to draw an ore card
    function drawOreCard(x, y, w, h, type, onClick) {
      const hovered = mouse.x >= x && mouse.x <= x + w && mouse.y >= y && mouse.y <= y + h;
      ctx.fillStyle = hovered ? '#3a3a4a' : '#1a1a24';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#3a3a48';
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
      const ot = ORE_TYPES[type];
      if (ot.glow) {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = ot.glow;
        ctx.fillRect(x + 2, y + 2, 16, h - 4);
        ctx.globalAlpha = 1;
      }
      drawOreIcon(x + 4, y + (h - 12) / 2, type, 12);
      pixelText(ot.name, x + 24, y + 4, 10, '#fff');
      pixelText('$' + fmtShort(ot.value) + '/s', x + 24, y + h - 12, 9, C.textHi);
      if (hovered && mouse.clicked) onClick();
    }

    // BUILD UNIFIED FILTERED LIST: every ore the player owns, with where it came from
    const pool = []; // { type, from, idx }
    for (let i = 0; i < game.carried.length; i++) pool.push({ type: game.carried[i], from: 'carried', idx: i });
    for (let i = 0; i < game.placed.length; i++) {
      if (game.placed[i]) pool.push({ type: game.placed[i], from: 'placed', idx: i });
    }
    const searchTerm = (game.machine.search || '').trim();
    const filtered = pool.filter((p) => {
      const ot = ORE_TYPES[p.type];
      if (!ot) return false;
      if (game.machine.filter && ot.quality !== game.machine.filter) return false;
      if (searchTerm && !ot.name.toLowerCase().includes(searchTerm)) return false;
      return true;
    });

    // RENDER 2-column SCROLLABLE list
    const listTop = 244;
    const listH = H - listTop - 70;
    const listLeft = 40;
    const listRight = W - 56; // leave 16px for scrollbar
    const cardW = (listRight - listLeft - 8) / 2;
    const cardH = 28;
    const cardStep = cardH + 2;
    const cols = 2;
    const rows = Math.ceil(filtered.length / cols);
    const contentH = rows * cardStep;
    const maxScroll = Math.max(0, contentH - listH);

    // mouse wheel inside the list area scrolls
    const inListArea = mouse.x >= listLeft - 8 && mouse.x <= listRight + 24 &&
                       mouse.y >= listTop && mouse.y <= listTop + listH;
    if (inListArea && mouse.wheelDelta !== 0) {
      game.machine.scroll = (game.machine.scroll || 0) + mouse.wheelDelta;
    }
    game.machine.scroll = Math.max(0, Math.min(maxScroll, game.machine.scroll || 0));
    const scrollY = game.machine.scroll;

    if (filtered.length === 0) {
      const msg = pool.length === 0 ? '(you have no ores)' : '(no ores match the filter)';
      pixelText(msg, W / 2, listTop + 24, 12, '#666', 'center');
    } else {
      // Clip rendering to viewport
      ctx.save();
      ctx.beginPath();
      ctx.rect(listLeft - 2, listTop, listRight - listLeft + 4, listH);
      ctx.clip();
      for (let i = 0; i < filtered.length; i++) {
        const p = filtered[i];
        const col = i % cols;
        const row = (i / cols) | 0;
        const x = listLeft + col * (cardW + 8);
        const y = listTop + row * cardStep - scrollY;
        // skip cards entirely outside viewport
        if (y + cardH < listTop || y > listTop + listH) continue;
        drawOreCard(x, y, cardW, cardH, p.type, () => {
          // only register clicks where the card is fully inside the viewport
          if (y >= listTop && y + cardH <= listTop + listH) machineAddInput(p.from, p.idx);
        });
      }
      ctx.restore();
      // Scrollbar
      if (maxScroll > 0) {
        const sbX = listRight + 4;
        const sbW = 8;
        ctx.fillStyle = '#0a0a14';
        ctx.fillRect(sbX, listTop, sbW, listH);
        const thumbH = Math.max(24, listH * (listH / contentH));
        const thumbY = listTop + (scrollY / maxScroll) * (listH - thumbH);
        ctx.fillStyle = '#5a3aa0';
        ctx.fillRect(sbX, thumbY, sbW, thumbH);
        ctx.fillStyle = '#80c0ff';
        ctx.fillRect(sbX, thumbY, sbW, 2);
        // touch-friendly up/down arrows
        ctx.fillStyle = '#1a1a24';
        ctx.fillRect(sbX - 14, listTop, 12, 14);
        ctx.fillRect(sbX - 14, listTop + listH - 14, 12, 14);
        pixelText('^', sbX - 8, listTop + 2, 12, '#80c0ff', 'center');
        pixelText('v', sbX - 8, listTop + listH - 13, 12, '#80c0ff', 'center');
        const upH = mouse.x >= sbX - 14 && mouse.x <= sbX - 2 && mouse.y >= listTop && mouse.y <= listTop + 14;
        const dnH = mouse.x >= sbX - 14 && mouse.x <= sbX - 2 && mouse.y >= listTop + listH - 14 && mouse.y <= listTop + listH;
        if (upH && mouse.clicked) game.machine.scroll = Math.max(0, scrollY - cardStep * 3);
        if (dnH && mouse.clicked) game.machine.scroll = Math.min(maxScroll, scrollY + cardStep * 3);
      }
    }

    // money top right
    panel(W - 200, H - 50, 184, 36, '#0e0820');
    drawCoin(W - 192, H - 38, 12);
    pixelText('$' + fmtShort(game.money), W - 172, H - 40, 13, '#fff');

    // CONVERT ALL — bottom-left, prominent
    if (button(20, H - 50, 220, 36, 'CONVERT ALL')) machineConvertAll();

    // leave button (centered)
    if (button(W / 2 - 80, H - 50, 160, 36, 'LEAVE [B]')) closeMachine();
    if (input('b')) closeMachine();

    // Top-right ✕ close — always visible even when the mobile keyboard
    // is covering the bottom of the screen. Tapping it both blurs the search
    // input (dismissing the keyboard) and closes the machine.
    const closeX = W - 44, closeY = 10, closeS = 32;
    ctx.fillStyle = 'rgba(60,10,10,0.85)';
    ctx.fillRect(closeX, closeY, closeS, closeS);
    ctx.fillStyle = '#ff4040';
    ctx.fillRect(closeX, closeY, closeS, 2);
    ctx.fillRect(closeX, closeY + closeS - 2, closeS, 2);
    ctx.fillRect(closeX, closeY, 2, closeS);
    ctx.fillRect(closeX + closeS - 2, closeY, 2, closeS);
    pixelText('x', closeX + closeS / 2, closeY + 6, 20, '#ff8080', 'center');
    const closeHov = mouse.x >= closeX && mouse.x <= closeX + closeS &&
                     mouse.y >= closeY && mouse.y <= closeY + closeS;
    if (closeHov && mouse.clicked) {
      machineSearchInput.blur();
      closeMachine();
    }
  }

  // Generic buy: server-authoritative when online, local fallback offline.
  // Server emits game_state which will overwrite local counters anyway, so the local
  // increment is only used when offline.
  function buyItem(serverName, cost, applyLocal) {
    if (isOnline()) {
      net.sock.emit('purchase', { item: serverName });
      return;
    }
    if (game.money < cost) return;
    game.money -= cost;
    applyLocal();
    // oxygen tank also refills locally
    if (serverName === 'oxygen') game.oxygen = game.oxygenMax;
  }

    pixelText('DEPTH', W / 2 + 4, 84, 80, '#1a0820', 'center');

    ctx.fillStyle = '#a880ff';
    ctx.fillRect(W / 2 - 120, 168, 240, 3);
    ctx.fillStyle = '#5a3aa0';

  // ---------- LEADERBOARDS ----------
  let leaderboardCache = null;
  let leaderboardTab = 'money';
  let leaderboardLoading = false;
  async function openLeaderboards() {
    game.scene = 'leaderboards';
    leaderboardLoading = true;
    try {
      const r = await fetch('/api/leaderboards');
      leaderboardCache = await r.json();
    } catch (e) { leaderboardCache = null; }
    leaderboardLoading = false;
  }

  function drawLeaderboards() {
    ctx.fillStyle = '#0a0820';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = ['#0a0820', '#15123a', '#26204a', '#3a2c5a', '#5a3a6a'][i];
      ctx.fillRect(0, i * 60, W, 60);
    }
    pixelText('LEADERBOARDS', W / 2, 40, 36, '#ffe080', 'center');

    const tabs = [
      { key: 'money',           label: 'MONEY'    },
      { key: 'weights',         label: 'WEIGHTS'  },
      { key: 'belts',           label: 'BELTS'    },
      { key: 'backpacks',       label: 'BACKPACK' },
      { key: 'troveExpansions', label: 'TROVE'    },
      { key: 'oxygenTanks',     label: 'OXYGEN'   },
    ];
    const tabW = 110, tabH = 30, tabY = 90;
    const tabsTotalW = tabs.length * (tabW + 4) - 4;
    const tabsX0 = (W - tabsTotalW) / 2;
    for (let i = 0; i < tabs.length; i++) {
      const x = tabsX0 + i * (tabW + 4);
      const active = leaderboardTab === tabs[i].key;
      ctx.fillStyle = active ? '#3a1c5a' : '#1a1430';
      ctx.fillRect(x, tabY, tabW, tabH);
      ctx.fillStyle = active ? '#a880ff' : '#5a3aa0';
      ctx.fillRect(x, tabY, tabW, 2);
      ctx.fillRect(x, tabY + tabH - 2, tabW, 2);
      pixelText(tabs[i].label, x + tabW / 2, tabY + 9, 11, active ? '#ffe080' : '#aaa', 'center');
      if (mouse.x >= x && mouse.x <= x + tabW && mouse.y >= tabY && mouse.y <= tabY + tabH && mouse.clicked) {
        leaderboardTab = tabs[i].key;
      }
    }

    const listX = W / 2 - 200, listY = 140, listW = 400, listH = 360;
    panel(listX, listY, listW, listH);
    if (leaderboardLoading) {
      pixelText('loading...', W / 2, listY + 30, 14, C.textDim, 'center');
    } else if (!leaderboardCache || !leaderboardCache[leaderboardTab]) {
      pixelText('no data', W / 2, listY + 30, 14, C.textDim, 'center');
    } else {
      const entries = leaderboardCache[leaderboardTab];
      if (entries.length === 0) {
        pixelText('no entries yet', W / 2, listY + 30, 14, C.textDim, 'center');
      }
      for (let i = 0; i < entries.length && i < 10; i++) {
        const e = entries[i];
        const row = listY + 14 + i * 32;
        const isMe = auth.username && e.name.toLowerCase() === auth.username.toLowerCase();
        ctx.fillStyle = isMe ? '#3a2c5a' : '#1a1020';
        ctx.fillRect(listX + 8, row, listW - 16, 28);
        ctx.fillStyle = i === 0 ? '#ffe080' : i === 1 ? '#c0c0c0' : i === 2 ? '#cc8050' : '#aaa';
        pixelText('#' + (i + 1), listX + 20, row + 8, 14, ctx.fillStyle);
        pixelText(e.name, listX + 60, row + 8, 13, isMe ? '#ffffff' : '#fff');
        const valStr = leaderboardTab === 'money' ? '$' + fmtShort(e.value) : String(e.value);
        pixelText(valStr, listX + listW - 16, row + 8, 13, C.textHi, 'right');
      }
    }

    if (button(W / 2 - 80, H - 50, 160, 32, 'BACK [B]')) {
      game.scene = 'menu';
    }
    if (justPressed['b']) game.scene = 'menu';
  }

  async function openVisit(username) {
    game.visit = { username, loading: true, data: null };
    game.scene = 'base';
    try {
      const r = await fetch('/api/visit?user=' + encodeURIComponent(username));
      if (r.ok) {
        game.visit.data = await r.json();
      } else {
        game.visit.error = 'could not load';
      }
    } catch (e) {
      game.visit.error = 'network error';
    }
    if (game.visit) game.visit.loading = false;
  }

  // ---------- CHAT ----------
  const chatOverlay = document.getElementById('chatOverlay');
  const chatInput = document.getElementById('chatInput');
  const machineSearchInput = document.getElementById('machineSearch');
  machineSearchInput.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Escape') {
      machineSearchInput.value = '';
      if (game.machine) game.machine.search = '';
      machineSearchInput.blur(); // dismiss keyboard on mobile
    }
  });
  machineSearchInput.addEventListener('keyup', (e) => { e.stopPropagation(); });
  machineSearchInput.addEventListener('input', () => {
    if (game.machine) game.machine.search = machineSearchInput.value.toLowerCase();
  });
  const chatMessages = []; // { from, text, ts }
  const CHAT_VISIBLE_MS = 8000;
  const CHAT_FADE_MS = 2000;
  const CHAT_KEEP = 12; // max recent kept in memory

  function chatOpen() {
    if (!auth.username) return; // only logged in users
    if (game.scene === 'login' || game.scene === 'boot') return;
    clearAllKeys();
    chatOverlay.classList.add('show');
    setTimeout(() => chatInput.focus(), 20);
  }
  function chatClose() {
    chatOverlay.classList.remove('show');
    chatInput.value = '';
    chatInput.blur();
    clearAllKeys();
  }
  function chatSend() {
    const t = chatInput.value.trim();
    chatInput.value = '';
    chatClose();
    if (!t || !net.connected || !net.sock) return;
    net.sock.emit('chat_message', { text: t });
  }
  chatInput.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') { chatSend(); e.preventDefault(); }
    else if (e.key === 'Escape') { chatClose(); e.preventDefault(); }
  });
  // Also stop key events while typing from leaking into game movement
  chatInput.addEventListener('keyup', (e) => { e.stopPropagation(); });

  function drawChatMessages() {
    if (chatMessages.length === 0) return;
    const now = Date.now();
    // newest at bottom; render up to 8 most recent
    const recent = chatMessages.slice(-8);
    const baseY = H - 110 - (chatOverlay.classList.contains('show') ? 60 : 0);
    for (let i = 0; i < recent.length; i++) {
      const m = recent[i];
      const age = now - m.ts;
      if (age > CHAT_VISIBLE_MS + CHAT_FADE_MS) continue;
      let alpha = 1;
      if (age > CHAT_VISIBLE_MS) alpha = 1 - (age - CHAT_VISIBLE_MS) / CHAT_FADE_MS;
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      const y = baseY - (recent.length - 1 - i) * 16;
      // bg
      const fullText = `${m.from}: ${m.text}`;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(8, y, Math.min(W - 16, fullText.length * 7 + 16), 15);
      // name
      const isMe = auth.username && m.from === auth.username;
      const nameColor = isMe ? '#ffe080' : '#a0c8ff';
      pixelText(m.from, 12, y + 2, 11, nameColor);
      pixelText(':', 12 + m.from.length * 7, y + 2, 11, '#aaa');
      pixelText(m.text, 12 + m.from.length * 7 + 8, y + 2, 11, '#fff');
    }
    ctx.globalAlpha = 1;
  }

  // ---------- ADMIN PANEL ----------
  const adminPinOverlay = document.getElementById('adminPinOverlay');
  const adminPinInput = document.getElementById('adminPinInput');
  const adminPinSubmit = document.getElementById('adminPinSubmit');
  const adminPinCancel = document.getElementById('adminPinCancel');
  const adminPinErr = document.getElementById('adminPinErr');
  const adminSpawnOverlay = document.getElementById('adminSpawnOverlay');
  const adminSpawnSearch = document.getElementById('adminSpawnSearch');
  const adminSpawnList = document.getElementById('adminSpawnList');
  const adminSpawnCount = document.getElementById('adminSpawnCount');
  const adminSpawnInfo = document.getElementById('adminSpawnInfo');
  let adminPin = null; // held in memory only, never persisted
  let adminStats = null;
  let adminPlayers = []; // [{ sid, name, depth, alive }]
  let adminRefreshAcc = 0;
  let adminSpawnOreTypes = [];

  function openAdminPin() {
    if (!auth.isAdmin || !auth.token) return;
    adminPinErr.textContent = '';
    adminPinInput.value = '';
    clearAllKeys();
    adminPinOverlay.classList.add('show');
    // Aggressive focus — some browsers refuse focus on freshly-shown elements
    // until the next frame, so we try a few times.
    adminPinInput.focus();
    requestAnimationFrame(() => adminPinInput.focus());
    setTimeout(() => adminPinInput.focus(), 50);
  }
  function closeAdminPin() {
    adminPinOverlay.classList.remove('show');
    clearAllKeys();
  }
  async function submitAdminPin() {
    const pin = adminPinInput.value.trim();
    if (!pin) { adminPinErr.textContent = 'enter the pin'; return; }
    adminPinSubmit.disabled = true;
    try {
      const r = await fetch('/api/admin/verify_pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: auth.token, pin }),
      });
      if (r.ok) {
        adminPin = pin;
        closeAdminPin();
        game.scene = 'admin';
        adminRefreshAcc = 0;
        refreshAdminStats();
        refreshAdminPlayers();
        showAdminSpawnPanel();
      } else {
        const data = await r.json().catch(() => ({}));
        adminPinErr.textContent = data.error === 'wrong_pin' ? 'wrong pin'
          : data.error === 'pin_not_configured' ? 'pin not set on server'
          : data.error === 'not_admin' ? 'not admin'
          : 'access denied';
      }
    } catch (e) {
      adminPinErr.textContent = 'network error';
    }
    adminPinSubmit.disabled = false;
  }
  adminPinSubmit.addEventListener('click', submitAdminPin);
  adminPinCancel.addEventListener('click', () => { closeAdminPin(); });
  // Block all key events from leaking to the window-level handler (which can
  // otherwise interfere with input focus / digit insertion). Same pattern as chat.
  adminPinInput.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') { submitAdminPin(); e.preventDefault(); }
    else if (e.key === 'Escape') { closeAdminPin(); e.preventDefault(); }
  });
  adminPinInput.addEventListener('keyup', (e) => { e.stopPropagation(); });
  adminPinInput.addEventListener('keypress', (e) => { e.stopPropagation(); });
  // strip non-digits as user types (numpad+main row both emit digit characters)
  adminPinInput.addEventListener('input', () => {
    const cleaned = adminPinInput.value.replace(/[^0-9]/g, '');
    if (cleaned !== adminPinInput.value) adminPinInput.value = cleaned;
  });

  function initAdminSpawn() {
    adminSpawnOreTypes = Object.keys(ORE_TYPES).sort((a, b) => ORE_TYPES[b].value - ORE_TYPES[a].value);
    refreshAdminSpawnList();
    adminSpawnSearch.addEventListener('input', refreshAdminSpawnList);
    adminSpawnList.addEventListener('click', (e) => {
      const button = e.target.closest('button[data-ore]');
      if (!button) return;
      spawnAdminOre(button.dataset.ore);
    });
  }

  function refreshAdminSpawnList() {
    const query = adminSpawnSearch.value.trim().toLowerCase();
    const visible = adminSpawnOreTypes.filter(type => {
      const ore = ORE_TYPES[type];
      return ore.name.toLowerCase().includes(query) || type.toLowerCase().includes(query);
    });
    adminSpawnCount.textContent = `${visible.length} ores shown`;
    adminSpawnList.innerHTML = visible.map(type => {
      const ore = ORE_TYPES[type];
      return `
        <div class="spawnRow">
          <div class="spawnRowName">${ore.name}</div>
          <div class="spawnRowValue">${fmtShort(ore.value)}</div>
          <button type="button" data-ore="${type}">SPAWN</button>
        </div>`;
    }).join('');
  }

  function showAdminSpawnPanel() {
    adminSpawnOverlay.classList.add('show');
    refreshAdminSpawnList();
  }

  function hideAdminSpawnPanel() {
    adminSpawnOverlay.classList.remove('show');
  }

  function spawnAdminOre(type) {
    if (!auth.isAdmin || game.scene !== 'admin') return;
    if (!ORE_TYPES[type]) return;
    game.carried.push(type);
    adminSpawnInfo.textContent = `spawned ${ORE_TYPES[type].name} into inventory` +
      (game.carried.length > game.carriedMax ? ' (overflow allowed)' : '');
  }

  initAdminSpawn();

  async function refreshAdminStats() {
    if (!adminPin) return;
    try {
      const r = await fetch('/api/admin/stats', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: auth.token, pin: adminPin }),
      });
      if (r.ok) adminStats = await r.json();
    } catch (e) {}
  }

  async function refreshAdminPlayers() {
    if (!adminPin) return;
    try {
      const r = await fetch('/api/admin/online_players', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: auth.token, pin: adminPin }),
      });
      if (r.ok) {
        const data = await r.json();
        adminPlayers = Array.isArray(data.players) ? data.players : [];
      }
    } catch (e) {}
  }

  async function kickPlayer(target) {
    if (!adminPin || !target) return;
    if (!confirm(`Kick ${target}? Their tab will be disconnected.`)) return;
    try {
      await fetch('/api/admin/kick', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: auth.token, pin: adminPin, target }),
      });
      await refreshAdminPlayers();
      await refreshAdminStats();
    } catch (e) { console.error(e); }
  }

  // Preset reload messages — order matters (first 4 shown as buttons, last is CUSTOM)
  const RELOAD_PRESETS = [
    { label: 'UPDATE',      message: 'New update available — reload to get the latest!' },
    { label: 'MAINTENANCE', message: 'Quick server maintenance — please wait a moment after reload.' },
    { label: 'BUG FIX',     message: 'Bug fix deployed — reloading.' },
    { label: 'EVENT',       message: 'Special event starting — reload to join!' },
  ];

  async function adminForceReload(message) {
    if (!auth.isAdmin || !auth.token || !adminPin) return;
    const previewMsg = message || 'Server restart — reloading.';
    if (!confirm(`Force ALL players to reload?\n\nMessage they'll see:\n"${previewMsg}"`)) return;
    try {
      await fetch('/api/admin/force_reload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: auth.token,
          pin: adminPin,
          message: message || undefined,
        }),
      });
    } catch (e) { console.error(e); }
  }

  function adminForceReloadCustom() {
    if (!auth.isAdmin || !auth.token || !adminPin) return;
    const msg = prompt('Enter the message all players will see when reloaded:', 'Server update — please refresh!');
    if (msg === null) return; // cancelled
    adminForceReload(msg.trim() || 'Server reload requested.');
  }

  function leaveAdmin() {
    adminPin = null; // forget on leave; require re-entry next time
    adminStats = null;
    adminPlayers = [];
    hideAdminSpawnPanel();
    game.scene = 'menu';
  }

  function drawAdmin() {
    // auto-refresh every 3s while in the panel
    adminRefreshAcc += 1 / 20;
    if (adminRefreshAcc >= 3) {
      adminRefreshAcc = 0;
      refreshAdminStats();
      refreshAdminPlayers();
    }

    ctx.fillStyle = '#100408';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,40,40,0.04)';
    for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
    ctx.fillStyle = '#3a0a0a';
    ctx.fillRect(0, 0, W, 56);
    ctx.fillStyle = '#ff4040';
    ctx.fillRect(0, 54, W, 2);
    pixelText('⚠  ADMIN PANEL  ⚠', W / 2, 14, 24, '#ff8080', 'center');
    pixelText(`signed in as ${auth.username}`, W / 2, 42, 11, '#aa8080', 'center');

    // stats (compact, one row)
    panel(40, 70, W - 80, 60, '#1a0810', '#ff4040', '#7a1010');
    const online = adminStats ? adminStats.online : '?';
    const accts = adminStats ? adminStats.accounts : '?';
    const socks = adminStats ? adminStats.activeSockets : '?';
    pixelText(`ONLINE ${online}`, 60, 84, 14, '#ff8080');
    pixelText(`ACCOUNTS ${accts}`, 200, 84, 14, '#ff8080');
    pixelText(`SOCKETS ${socks}`, 360, 84, 14, '#ff8080');
    if (button(W - 130, 86, 90, 26, 'REFRESH')) {
      refreshAdminStats();
      refreshAdminPlayers();
    }

    // online players list with kick buttons
    panel(40, 140, W - 80, 280, '#1a0810', '#ff4040', '#7a1010');
    pixelText('ONLINE PLAYERS', 60, 150, 13, '#ff8080');

    const visible = (adminPlayers || []).slice(0, maxVisibleRows);
    if (visible.length === 0) {
      pixelText('no one online (or list not loaded yet)', W / 2, 230, 12, '#aaa', 'center');
    }
    for (let i = 0; i < visible.length; i++) {
      const p = visible[i];
      const rowY = 174 + i * rowH;
      ctx.fillStyle = '#0a0408';
      ctx.fillRect(50, rowY, W - 100, rowH - 4);

    pixelText('FORCE RELOAD WITH MESSAGE:', 50, 426, 11, '#ff8080');
    const presetW = (W - 100 - 8 * 4) / 5; // 4 presets + custom = 5 buttons
    for (let i = 0; i < RELOAD_PRESETS.length; i++) {
      const bx = 50 + i * (presetW + 8);
      if (button(bx, 442, presetW, 30, RELOAD_PRESETS[i].label)) {
        adminForceReload(RELOAD_PRESETS[i].message);

    if (button(50 + 4 * (presetW + 8), 442, presetW, 30, 'CUSTOM…')) {
      adminForceReloadCustom();

    // silent reload (no message) — just sends the default
    if (button(50, 478, W - 100, 24, 'silent reload (no message)')) {
      adminForceReload();

    // leave
    if (button(W / 2 - 100, H - 58, 200, 34, 'LEAVE [B]')) leaveAdmin();
    if (justPressed['b']) leaveAdmin();

    pixelText('auto-refresh every 3s · PIN cleared on leave', W / 2, H - 14, 10, '#aa8080', 'center');

  // ---------- DEATH ----------
  function drawDeathScreen() {
    drawShaft();
    ctx.fillStyle = 'rgba(20,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    // vignette
    const grd = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 500);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, 'rgba(0,0,0,0.9)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    panel(W / 2 - 220, H / 2 - 110, 440, 220, '#1a0810', '#ff4040', '#7a1010');
    pixelText('YOU DIED', W / 2, H / 2 - 88, 44, '#ff4040', 'center');
    pixelText('all carried ores were lost', W / 2, H / 2 - 36, 14, '#fff', 'center');
    pixelText(`depth reached: ${Math.floor(game.maxDepth)}m`, W / 2, H / 2 - 14, 12, C.textDim, 'center');
    pixelText(`income kept: +$${fmtShort(passiveIncome())}/s`, W / 2, H / 2 + 4, 12, C.textHi, 'center');
    if (button(W / 2 - 90, H / 2 + 36, 180, 48, 'TRY AGAIN')) {
      game.player.limp = 0;
      exitShaftToSurface();
    }
  }

  // ---------- MAIN LOOP ----------
  const DT = 1 / 20;
  let passiveAcc = 0;

  function update() {
    game.timeAcc += DT;

    passiveAcc += DT;
    if (passiveAcc >= 1) {
      const ticks = Math.floor(passiveAcc);
      passiveAcc -= ticks;
      game.money += passiveIncome() * ticks;
    }

    if (game.scene === 'surface') updateSurface(DT);
    else if (game.scene === 'shaft') updateShaft(DT);

    // drop any pending drag if we leave the base scene
    if (game.scene !== 'base' && game.drag) game.drag = null;
    if (game.scene !== 'base' && game.visit) game.visit = null;
    if (game.scene !== 'machine' && game.machine) game.machine = null;

    updateParticles();

    if (game.collectToast) {
      game.collectToast.time -= DT;
      if (game.collectToast.time <= 0) game.collectToast = null;
    }

    if (game.screenShake > 0) game.screenShake--;

    for (const k in justPressed) delete justPressed[k];
  }

  function draw() {
    ctx.save();
    if (game.screenShake > 0) {
      ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
    }
    ctx.clearRect(0, 0, W, H);
    if (game.scene === 'boot') drawBoot();
    else if (game.scene === 'menu') drawMenu();
    else if (game.scene === 'leaderboards') drawLeaderboards();
    else if (game.scene === 'admin') drawAdmin();
    else if (game.scene === 'title') drawTitle();
    else if (game.scene === 'surface') drawSurface();
    else if (game.scene === 'shaft') drawShaft();
    else if (game.scene === 'base') drawBaseScreen();
    else if (game.scene === 'shop') drawShopScreen();
    else if (game.scene === 'machine') drawMachineScreen();
    else if (game.scene === 'dead') drawDeathScreen();
    ctx.restore();

    // scanlines overlay for arcade feel
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#000';
    for (let y = 0; y < H; y += 2) {
      ctx.fillRect(0, y, W, 1);
    }
    ctx.globalAlpha = 1;

    // vignette
    const vg = ctx.createRadialGradient(W / 2, H / 2, 250, W / 2, H / 2, 500);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    drawTouchButtons();
    drawDepthBar();
    drawCollectToast();
    drawChatMessages();
  }

  function drawTouchButtons() {
    if (!touch.mode) return;
    if (game.scene !== 'surface' && game.scene !== 'shaft') return;
    const drawBtn = (x, y, w, h, label, key, big = false) => {
      const pressed = keys[key];
      ctx.fillStyle = pressed ? 'rgba(80,60,160,0.75)' : 'rgba(20,15,40,0.55)';
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = pressed ? '#c0a0ff' : '#5a3aa0';
      ctx.fillRect(x, y, w, 3);
      ctx.fillRect(x, y + h - 3, w, 3);
      ctx.fillRect(x, y, 3, h);
      ctx.fillRect(x + w - 3, y, 3, h);
      pixelText(label, x + w / 2, y + h / 2 - (big ? 8 : 10), big ? 16 : 22, '#fff', 'center');
    };
    drawBtn(10, H - 90, 70, 70, '<', 'a');
    drawBtn(90, H - 90, 70, 70, '>', 'd');
    drawBtn(W - 90, H - 180, 70, 70, '^', 'w');
    drawBtn(W - 90, H - 90, 70, 70, 'v', 's');
    drawBtn(W - 170, H - 90, 70, 70, 'GRAB', ' ', true);
  }

  // depth bar on the right edge — log scale so deep tiers stay visible
  function drawDepthBar() {
    if (game.scene !== 'surface' && game.scene !== 'shaft') return;
    const barX = W - 22, barY = 74, barW = 14, barH = H - 156;
    const N = TIER_ORDER.length;
    // Tier-based mapping: each tier gets equal vertical space on the bar, regardless
    // of the absolute depth values. Gives an even spread across all 25 tiers instead
    // of crushing the late tiers into the bottom.
    const dToY = (d) => {
      if (d <= 0) return barY;
      // find current tier index
      let i = 0;
      for (let k = N - 1; k >= 0; k--) {
        if (d >= TIER_ORDER[k].minDepth) { i = k; break; }
      }
      const lower = TIER_ORDER[i].minDepth;
      const upper = (i + 1 < N) ? TIER_ORDER[i + 1].minDepth : Math.max(lower * 1.3, lower + 1000);
      const frac = Math.min(1, (d - lower) / Math.max(1, upper - lower));
      const t = (i + frac) / N;
      return barY + Math.min(1, t) * barH;
    };
    // bg panel
    panel(barX - 4, barY - 16, barW + 8, barH + 32);
    pixelText('DEPTH', barX + barW / 2, barY - 13, 9, '#fff', 'center');
    // gradient inside
    for (let i = 0; i < barH; i++) {
      const t = i / barH;
      const r = Math.round(58 * (1 - t));
      const g = Math.round(40 * (1 - t));
      const b = Math.round(28 * (1 - t));
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(barX, barY + i, barW, 1);
    }
    // tier markers — show every-other tier boundary so labels don't overlap, plus first/last
    const labelEvery = N > 12 ? 3 : 2;
    for (let i = 0; i < N; i++) {
      const m = TIER_ORDER[i].minDepth;
      if (m <= 0) continue;
      const my = dToY(m);
      ctx.fillStyle = '#5a3a22';
      ctx.fillRect(barX - 3, my, barW + 6, 1);
      if (i % labelEvery === 0 || i === N - 1) {
        const label = m >= 1000 ? (m / 1000).toFixed(m >= 10000 ? 0 : 1) + 'k' : String(m);
        pixelText(label, barX - 6, my - 5, 7, '#aaa', 'right');
      }
    }
    // remote players
    for (const sid in net.remotePlayers) {
      const rp = net.remotePlayers[sid];
      if (!rp) continue;
      const d = rp.depth || 0;
      const ry = dToY(d);
      const pal = paletteFor(sid);
      ctx.fillStyle = pal.helmet;
      ctx.fillRect(barX - 1, ry - 1, barW + 2, 3);
    }
    // own marker
    const myD = game.scene === 'shaft' ? game.depth : 0;
    const myY = dToY(myD);
    ctx.fillStyle = '#fff';
    ctx.fillRect(barX - 4, myY - 3, barW + 8, 6);
    ctx.fillStyle = C.helmet;
    ctx.fillRect(barX - 3, myY - 2, barW + 6, 4);
  }

  // gate: check existing session before booting; tryRestoreSession will move scene
  // to 'menu' (and call initNetwork) on success, or show the login overlay on failure
  tryRestoreSession();

  // Pause everything (state advance AND rendering) when the tab is hidden.
  // Without this, browsers throttle setInterval on backgrounded/idle tabs and then
  // fire a BURST of missed ticks when focus returns — burning seconds of oxygen
  // in one frame. Also resets keys + draw timing on resume.
  let lastVisibleAt = performance.now();
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearAllKeys();
    } else {
      lastVisibleAt = performance.now();
      // resync drain clock so the time we were hidden isn't suddenly applied
      game.lastShaftTickTime = performance.now();
      clearAllKeys();
    }
  });

  setInterval(() => {
    if (document.hidden) return; // freeze game state until tab is visible again
    update();
    sendUpdate();
    draw();
    mouse.clicked = false;
    mouse.released = false;
    mouse.releasedAsDrag = false;
    mouse.wheelDelta = 0;
  }, 1000 / 20);

})();
</script>
</body>
</html>
