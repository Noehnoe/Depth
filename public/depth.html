  // ---------- ORE GENERATION ----------
  // New distribution: rare high-tier ores, occasional LUCKY drops from much deeper tiers.
  // 55% standard (current deepest tier), 40% any shallower tier, 5% LUCKY (deeper tier).
  // Within shallow & lucky picks, closer-to-current is much more likely than far-away.
  function pickOreTypeForDepth(d) {
    let deepest = 0;
    for (let i = 0; i < TIER_ORDER.length; i++) {
      if (d >= TIER_ORDER[i].minDepth) deepest = i;
    }
    const roll = Math.random();
    if (roll < 0.55 || (deepest === 0 && roll < 0.95)) {
      return TIER_ORDER[deepest].type;
    }
    if (roll < 0.95 && deepest > 0) {
      // pick a shallower tier, weighted toward closer (deeper) tiers
      let total = 0;
      for (let i = 0; i < deepest; i++) total += Math.pow(0.6, deepest - 1 - i);
      let r = Math.random() * total;
      for (let i = deepest - 1; i >= 0; i--) {
        r -= Math.pow(0.6, deepest - 1 - i);
        if (r <= 0) return TIER_ORDER[i].type;
      }
      return TIER_ORDER[0].type;
    }
    // 5% LUCKY drop — pick from deeper tiers that you wouldn't normally see
    const remaining = TIER_ORDER.length - 1 - deepest;
    if (remaining <= 0) return TIER_ORDER[deepest].type;
    // bias: 50% the next-deeper tier, 25% the one after, etc.
    let acc = 0;
    let bias = [];
    for (let i = 0; i < remaining; i++) {
      const w = Math.pow(0.5, i);
      bias.push(w);
      acc += w;
    }
    let r2 = Math.random() * acc;
    for (let i = 0; i < remaining; i++) {
      r2 -= bias[i];
      if (r2 <= 0) return TIER_ORDER[deepest + 1 + i].type;
    }
    return TIER_ORDER[deepest + 1].type;
  }

  function maybeGenerateOres() {
    // crash guard: if depth jumped massively (e.g. broken save with absurd speeds),
    // fast-forward instead of looping millions of times.
    if (game.depth - game.lastClusterDepth > 5000) {
      game.lastClusterDepth = game.depth - 200;
    }
    let iter = 0;
    while (game.lastClusterDepth + 50 <= game.depth + 200 && iter < 200) {
      iter++;
      game.lastClusterDepth += 50;
      const d = game.lastClusterDepth;
      const type = pickOreTypeForDepth(d);
      const side = Math.random() < 0.5 ? 'left' : 'right';
      const count = 3 + Math.floor(Math.random() * 4);
      const ores = [];
      for (let i = 0; i < count; i++) {
        const ox = (Math.random() * 4) | 0;
        const oy = i * 8 + (Math.random() * 2 | 0);
        ores.push({ ox, oy, collected: false });
      }
      game.oreClusters.push({ depth: d, side, type, ores });
    }
    if (iter >= 200) {
      // safety: catch up entirely so we never loop again next frame
      game.lastClusterDepth = game.depth + 200;
    }
    game.oreClusters = game.oreClusters.filter(c => c.depth > game.depth - 400);
  }

  // ---------- PARTICLES ----------
  function spawnParticles(x, y, color, n = 6) {
    for (let i = 0; i < n; i++) {
      game.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5 - 1.5,
        life: 14 + (Math.random() * 6) | 0,
        maxLife: 14,
        color,
        size: 2 + ((Math.random() * 2) | 0),
      });
    }
  }

  function spawnDust() {
    if (game.dustParticles.length > 40) return;
    if (Math.random() < 0.3) {
      game.dustParticles.push({
        x: SHAFT_LEFT + Math.random() * (SHAFT_RIGHT - SHAFT_LEFT),
        y: -10,
        vy: 0.5 + Math.random() * 1.5,
        vx: (Math.random() - 0.5) * 0.3,
        life: 60 + Math.random() * 60,
        alpha: 0.2 + Math.random() * 0.3,
      });
    }
  }

  function updateParticles() {
    for (const p of game.particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.35;
      p.vx *= 0.92;
      p.life--;
    }
    game.particles = game.particles.filter(p => p.life > 0);

    for (const d of game.dustParticles) {
      d.x += d.vx;
      d.y += d.vy;
      d.life--;
    }
    game.dustParticles = game.dustParticles.filter(d => d.life > 0 && d.y < H + 10);
  }

  function drawParticles(camX = 0, camY = 0) {
    for (const p of game.particles) {
      const a = Math.min(1, p.life / 12);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.fillRect((p.x - camX) | 0, (p.y - camY) | 0, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawDust() {
    for (const d of game.dustParticles) {
      ctx.globalAlpha = d.alpha * Math.min(1, d.life / 60);
      ctx.fillStyle = '#8a7c70';
      ctx.fillRect(d.x | 0, d.y | 0, 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  // ---------- DRAW HELPERS ----------
  function pixelText(text, x, y, size = 10, color = '#fff', align = 'left', shadow = true) {
    ctx.font = `bold ${size}px ${FONT}`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    if (shadow) {
      ctx.fillStyle = '#000';
      ctx.fillText(text, (x | 0) + 1, (y | 0) + 1);
    }
    ctx.fillStyle = color;
    ctx.fillText(text, x | 0, y | 0);
  }

  function panel(x, y, w, h, fill = C.hudBg, border = C.hudBorder, borderDark = C.hudBorderDark) {
    ctx.fillStyle = fill;
    ctx.fillRect(x, y, w, h);
    // outer border
    ctx.fillStyle = border;
    ctx.fillRect(x, y, w, 2);
    ctx.fillRect(x, y + h - 2, w, 2);
    ctx.fillRect(x, y, 2, h);
    ctx.fillRect(x + w - 2, y, 2, h);
    // corner shading (darker)
    ctx.fillStyle = borderDark;
    ctx.fillRect(x, y, 2, 2);
    ctx.fillRect(x + w - 2, y, 2, 2);
    ctx.fillRect(x, y + h - 2, 2, 2);
    ctx.fillRect(x + w - 2, y + h - 2, 2, 2);
  }

  function button(x, y, w, h, label, enabled = true) {
    const hovered = mouse.x >= x && mouse.x <= x + w && mouse.y >= y && mouse.y <= y + h;
    const pressed = hovered && mouse.down && enabled;
    let bg = enabled ? (hovered ? '#3a2a6a' : '#1a1430') : '#0e0a1a';
    let border = enabled ? (hovered ? '#a880ff' : '#5a3aa0') : '#2a2438';
    let fg = enabled ? (hovered ? '#fff' : '#e8e0ff') : '#555';
    ctx.fillStyle = bg;
    ctx.fillRect(x, y, w, h);
    // border
    ctx.fillStyle = border;
    ctx.fillRect(x, y, w, 2);
    ctx.fillRect(x, y + h - 2, w, 2);
    ctx.fillRect(x, y, 2, h);
    ctx.fillRect(x + w - 2, y, 2, h);
    // top highlight
    if (enabled && !pressed) {
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillRect(x + 2, y + 2, w - 4, 2);
    }
    pixelText(label, x + w / 2, y + h / 2 - 6, 12, fg, 'center');
    return enabled && hovered && mouse.clicked;
  }

  // ---------- MINER SPRITE ----------
  // 16 wide x 32 tall, drawn programmatically.
  // facing: -1 or 1
  // mode: 'surface' or 'shaft'
  // walkPhase: number for leg cycle
  function drawMiner(x, y, opts = {}) {
    const {
      walkPhase = 0,
      facing = 1,
      idleBob = 0,
      carryCount = 0,
      limp = 0,
      mode = 'surface',
      mining = false,
      ascending = false,
      blink = false,
      tint = null,
    } = opts;
    const tc = (key) => (tint && tint[key]) ? tint[key] : C[key];
    ctx.save();
    // pixel grid origin at x,y (top-left bounding box)
    const f = facing;
    const yo = idleBob;
    const px = (px_, py_, w, h, color) => {
      ctx.fillStyle = color;
      if (f === -1) {
        ctx.fillRect((x + 16 - px_ - w) | 0, (y + py_ + yo) | 0, w, h);
      } else {
        ctx.fillRect((x + px_) | 0, (y + py_ + yo) | 0, w, h);
      }
    };

    if (limp > 0) {
      // collapsed body — drawn flat
      // helmet
      px(2, 18, 6, 4, tc('helmet'));
      px(2, 17, 6, 1, C.helmetBand);
      // head
      px(8, 18, 4, 4, C.skin);
      // body
      px(3, 23, 9, 4, tc('overalls'));
      // legs splayed
      px(4, 27, 3, 2, C.boots);
      px(9, 27, 3, 2, C.boots);
      // lamp dim
      px(0, 20, 2, 1, C.lampGlow);
      ctx.restore();
      return;
    }

    // ---- HELMET ----
    // helmet dome (8 wide, 4 tall)
    px(4, 1, 8, 4, tc('helmet'));
    // helmet top highlight
    px(5, 1, 6, 1, '#fff080');
    // helmet brim
    px(3, 5, 10, 1, tc('helmet'));
    px(3, 6, 10, 1, tc('helmetShade'));
    // helmet band
    px(4, 4, 8, 1, C.helmetBand);
    // headlamp on front
    if (f === 1) {
      px(11, 3, 2, 2, C.lampGlow);
      px(13, 3, 1, 2, C.lamp);
    } else {
      // flipped via px function — passing position from left
      px(11, 3, 2, 2, C.lampGlow);
      px(13, 3, 1, 2, C.lamp);
    }

    // ---- FACE ----
    px(5, 7, 6, 3, C.skin);
    // jaw shadow
    px(5, 10, 6, 1, C.skinShade);
    // eye (one side based on facing)
    if (!blink) {
      px(9, 8, 1, 1, '#1a1410');
    } else {
      px(9, 8, 2, 1, '#1a1410');
    }
    // cheek
    px(8, 9, 1, 1, C.skinShade);

    // ---- BODY ----
    // overalls main (4-10y across, 11-22y down)
    px(4, 11, 8, 10, tc('overalls'));
    // shirt collar
    px(5, 11, 6, 1, tc('shirt'));
    // overall strap shading
    px(5, 12, 1, 4, tc('overallsShade'));
    px(10, 12, 1, 4, tc('overallsShade'));
    // pocket
    px(7, 16, 2, 3, tc('overallsShade'));
    // belt
    px(4, 19, 8, 1, '#1a0e08');
    px(7, 19, 2, 1, tc('helmet'));

    // ---- ARMS ----
    // arm swing for walking
    const armSwing = Math.sin(walkPhase) * 2;
    let armBackY = 13;
    let armFrontY = 13;
    if (mode === 'surface') {
      armBackY = 13 + armSwing;
      armFrontY = 13 - armSwing;
    } else if (mode === 'shaft') {
      if (mining) {
        // pickaxe swing
        armFrontY = 11 + Math.abs(Math.sin(walkPhase * 2)) * 2;
      }
      if (ascending) {
        armFrontY = 10;
        armBackY = 10;
      }
    }
    // arms hold close when carrying many
    const armX = carryCount > 6 ? 3 : 2;
    // back arm
    px(2, armBackY, 2, 5, tc('shirt'));
    px(2, armBackY + 5, 2, 1, C.skin);
    // front arm
    px(12, armFrontY, 2, 5, tc('shirt'));
    px(12, armFrontY + 5, 2, 1, C.skin);

    // ---- PICKAXE in shaft ----
    if (mode === 'shaft') {
      // handle
      px(13, armFrontY - 2, 1, 6, C.pickaxeHandle);
      // head
      px(11, armFrontY - 3, 5, 1, C.pickaxe);
      px(11, armFrontY - 4, 5, 1, '#aaa');
      px(11, armFrontY - 2, 1, 1, '#666');
      px(15, armFrontY - 2, 1, 1, '#666');
    }

    // ---- LEGS ----
    const legSwing = Math.sin(walkPhase) * 3;
    const lLegOff = (mode === 'surface') ? legSwing : 0;
    const rLegOff = (mode === 'surface') ? -legSwing : 0;
    // left leg
    px(5, 21, 2, 7 + Math.round(lLegOff * 0.2), tc('overalls'));
    px(5, 21, 1, 7, tc('overallsShade'));
    // right leg
    px(9, 21, 2, 7 + Math.round(rLegOff * 0.2), tc('overalls'));
    px(10, 21, 1, 7, tc('overallsShade'));
    // boots
    px(4, 28, 4, 3, C.boots);
    px(8, 28, 4, 3, C.boots);
    px(4, 28, 4, 1, '#000');
    px(8, 28, 4, 1, '#000');

    ctx.restore();
  }

  // ---------- LIGHT CONE (shaft helmet lamp) ----------
  function drawLightCone(cx, cy, facing) {
    // soft radial glow + cone
    const grd = ctx.createRadialGradient(cx, cy, 5, cx, cy, 110);
    grd.addColorStop(0, 'rgba(255,236,140,0.45)');
    grd.addColorStop(0.4, 'rgba(255,200,100,0.18)');
    grd.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // forward cone
    ctx.save();
    ctx.translate(cx, cy);
    if (facing < 0) ctx.scale(-1, 1);
    const cg = ctx.createLinearGradient(0, 0, 140, 0);
    cg.addColorStop(0, 'rgba(255,236,140,0.35)');
    cg.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(140, -60);
    ctx.lineTo(140, 60);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ---------- SURFACE UPDATE ----------
  function updateSurface(dt) {
    const p = game.player;
    const ACC = 1.2, MAX_VX = 4, FRICTION = 0.75;
    let movingX = false;
    if (input('a') || input('arrowleft')) { p.vx -= ACC; p.facing = -1; movingX = true; }
    if (input('d') || input('arrowright')) { p.vx += ACC; p.facing = 1; movingX = true; }
    if (!movingX) p.vx *= FRICTION;
    p.vx = Math.max(-MAX_VX, Math.min(MAX_VX, p.vx));
    if (Math.abs(p.vx) < 0.1) p.vx = 0;

    if ((input('w') || input('arrowup') || input(' ')) && p.onGround) {
      const upHeld = input('w') || input('arrowup');
      const intoBase = p.x + p.w > BASE_X && p.x < BASE_X + BASE_W;
      const intoMachine = p.x + p.w > MACHINE_X && p.x < MACHINE_X + MACHINE_W;
      const intoShop = p.x + p.w > SHOP_X && p.x < SHOP_X + SHOP_W;
      // also suppress jump when in front of a remote player's house
      let intoRemoteHouse = false;
      const remoteIds = Object.keys(net.remotePlayers);
      for (let i = 0; i < remoteIds.length; i++) {
        const hx = remoteHouseX(i);
        if (p.x + p.w > hx && p.x < hx + BASE_W) { intoRemoteHouse = true; break; }
      }
      if (!(intoBase && upHeld) && !(intoMachine && upHeld) && !(intoShop && upHeld) && !(intoRemoteHouse && upHeld)) {
        p.vy = -9;
        p.onGround = false;
      }
    }

    p.vy += 0.6;
    p.x += p.vx;
    p.y += p.vy;

    if (p.y + p.h >= SURFACE_GROUND_Y) {
      p.y = SURFACE_GROUND_Y - p.h;
      p.vy = 0;
      p.onGround = true;
    } else {
      p.onGround = false;
    }

    const ww = currentWorldWidth();
    if (p.x < 10) { p.x = 10; p.vx = 0; }
    if (p.x + p.w > ww - 10) { p.x = ww - 10 - p.w; p.vx = 0; }

    if (Math.abs(p.vx) > 0.5) p.walkPhase += 0.5; else p.walkPhase *= 0.7;
    p.bobPhase += dt;

    // blink
    p.blinkTimer += dt;
    if (p.blinkTimer > 3) { p.blink = true; if (p.blinkTimer > 3.15) { p.blink = false; p.blinkTimer = 0; } }

    game.cameraX = p.x + p.w / 2 - W / 2;
    game.cameraX = Math.max(0, Math.min(ww - W, game.cameraX));

    const pcx = p.x + p.w / 2;
    if ((input('w') || input('arrowup')) && p.onGround) {
      if (pcx >= BASE_X && pcx <= BASE_X + BASE_W) {
        game.visit = null;
        game.scene = 'base';
      } else if (pcx >= MACHINE_X && pcx <= MACHINE_X + MACHINE_W) {
        openMachine();
      } else if (pcx >= SHOP_X && pcx <= SHOP_X + SHOP_W) {
        game.scene = 'shop';
      } else {
        // check remote players' houses
        const remoteIds = Object.keys(net.remotePlayers);
        for (let i = 0; i < remoteIds.length; i++) {
          const hx = remoteHouseX(i);
          if (pcx >= hx && pcx <= hx + BASE_W) {
            const sid = remoteIds[i];
            const rp = net.remotePlayers[sid];
            const name = rp && rp.name && rp.name !== 'anon' ? rp.name : null;
            if (name) openVisit(name);
            break;
          }
        }
      }
    }

    if ((input('s') || input('arrowdown')) && p.onGround) {
      if (pcx >= HOLE_X && pcx <= HOLE_X + HOLE_W) {
        enterShaft();
      }
    }
  }

  function enterShaft() {
    game.scene = 'shaft';
    game.player.x = (SHAFT_LEFT + SHAFT_RIGHT) / 2 - game.player.w / 2;
    game.player.y = 100;
    game.player.vx = 0;
    game.player.vy = 0;
    game.depth = 0;
    game.oxygen = game.oxygenMax;
    game.hp = game.maxHp;
    game.suffocating = false;
    game.lastShaftTickTime = performance.now();
    game.lastClusterDepth = 0;
    game.oreClusters = [];
    game.particles = [];
    game.dustParticles = [];
    game.milestones = {};
    maybeGenerateOres();
  }

  function exitShaftToSurface() {
    game.scene = 'surface';
    game.player.x = HOLE_X + HOLE_W / 2 - game.player.w / 2;
    game.player.y = SURFACE_GROUND_Y - game.player.h;
    game.player.vx = 0;
    game.player.vy = 0;
    // surfacing fully restores HP and oxygen
    game.hp = game.maxHp;
    game.oxygen = game.oxygenMax;
    game.suffocating = false;
  }

  // ---------- SHAFT UPDATE ----------
  function updateShaft(dt) {
    const p = game.player;
    const ACC = 0.45;
    const MAX_VX = 3;
    let pushingLeft = false, pushingRight = false;
    if (input('a') || input('arrowleft')) { p.vx -= ACC; p.facing = -1; pushingLeft = true; }
    if (input('d') || input('arrowright')) { p.vx += ACC; p.facing = 1; pushingRight = true; }
    p.vx *= 0.95;
    if (p.vx > MAX_VX) p.vx = MAX_VX;
    if (p.vx < -MAX_VX) p.vx = -MAX_VX;

    p.x += p.vx;

    const interiorLeft = SHAFT_LEFT + 8;
    const interiorRight = SHAFT_RIGHT - 8 - p.w;
    if (p.x < interiorLeft) { p.x = interiorLeft; p.vx = 0; }
    if (p.x > interiorRight) { p.x = interiorRight; p.vx = 0; }

    const onLeftWall = p.x <= interiorLeft + 0.5;
    const onRightWall = p.x >= interiorRight - 0.5;
    if (onLeftWall && pushingLeft) game.wallPushTimer.left = Math.min(1, game.wallPushTimer.left + dt);
    else if (!onLeftWall) game.wallPushTimer.left = 0;
    else if (onLeftWall && !pushingLeft && game.wallPushTimer.left > 0.1) {
      p.vx = 3.5;
      game.wallPushTimer.left = 0;
    }
    if (onRightWall && pushingRight) game.wallPushTimer.right = Math.min(1, game.wallPushTimer.right + dt);
    else if (!onRightWall) game.wallPushTimer.right = 0;
    else if (onRightWall && !pushingRight && game.wallPushTimer.right > 0.1) {
      p.vx = -3.5;
      game.wallPushTimer.right = 0;
    }

    const descentSpeed = currentDescentSpeed();
    const ascending = input('w') || input('arrowup');
    let verticalSpeed = ascending ? -currentAscentSpeed() : descentSpeed;
    game.depth += verticalSpeed * dt;
    if (game.depth < 0) { game.depth = 0; exitShaftToSurface(); return; }
    if (game.depth > game.maxDepth) game.maxDepth = game.depth;

    // Use REAL wall-clock time for oxygen/HP drain so a stalled-then-burst tick
    // pattern (browser GC, JS thread blocked, etc.) can't suddenly drop 50% O2.
    // dt-based drain has been the bug: when ticks queue up, each tick still
    // decrements by a fixed amount, multiplying the loss.
    const _now = performance.now();
    if (!game.lastShaftTickTime) game.lastShaftTickTime = _now;
    let realDt = (_now - game.lastShaftTickTime) / 1000;
    game.lastShaftTickTime = _now;
    if (realDt < 0) realDt = 0;
    if (realDt > 0.5) realDt = 0.5; // cap any single stutter to 0.5s worth of drain

    if (game.oxygen > 0) {
      game.oxygen -= 4 * realDt;
      game.suffocating = false;
    }
    if (game.oxygen <= 0) {
      game.oxygen = 0;
      game.suffocating = true;
      game.hp -= 20 * realDt;
      if (game.hp <= 0) {
        game.hp = 0;
        die();
        return;
      }
    }

    if (Math.abs(p.vx) > 0.5) p.walkPhase += 0.5; else p.walkPhase *= 0.7;

    maybeGenerateOres();
    spawnDust();

    // Find ores in grab range; collect on SPACE
    const px2 = p.x + p.w / 2;
    const py2 = PLAYER_SHAFT_Y + p.h / 2;
    const grabRangeX = 28, grabRangeY = 22;
    game.grabbable = [];
    for (const c of game.oreClusters) {
      const baseScreenY = (c.depth - game.depth) + PLAYER_SHAFT_Y;
      if (baseScreenY < -50 || baseScreenY > H + 50) continue;
      for (const o of c.ores) {
        if (o.collected) continue;
        const wallX = c.side === 'left' ? SHAFT_LEFT - 4 + o.ox : SHAFT_RIGHT - 6 + o.ox;
        const sy = baseScreenY + o.oy;
        const dx = (wallX + 3) - px2;
        const dy = (sy + 3) - py2;
        if (Math.abs(dx) < grabRangeX && Math.abs(dy) < grabRangeY) {
          game.grabbable.push({ ore: o, cluster: c, sx: wallX, sy });
        }
      }
    }
    if (justPressed[' '] && game.grabbable.length > 0) {
      const tally = {}; // type -> count
      for (const g of game.grabbable) {
        if (game.carried.length >= game.carriedMax) break;
        g.ore.collected = true;
        game.carried.push(g.cluster.type);
        tally[g.cluster.type] = (tally[g.cluster.type] || 0) + 1;
        spawnParticles(g.sx + 3, g.sy + 3, ORE_TYPES[g.cluster.type].spec, 7);
        spawnParticles(g.sx + 3, g.sy + 3, ORE_TYPES[g.cluster.type].color, 4);
      }
      // toast: "Collected 1x Genesis ore (1M/s)" — one line per type collected
      const lines = [];
      for (const t in tally) {
        const ot = ORE_TYPES[t];
        lines.push(`Collected ${tally[t]}x ${ot.name} ore ($${fmtShort(ot.value)}/s)`);
      }
      if (lines.length > 0) showCollectToast(lines.join(' · '));
    }

    const MILESTONES = {
      200:   'DEEPER...',
      500:   "IT'S GETTING DARK",
      900:   'THE PRESSURE BUILDS',
      1400:  'CRYSTAL DEPTHS',
      2000:  'RUBY VEIN',
      2700:  'SAPPHIRE WATERS',
      3500:  'EMERALD ZONE',
      4400:  'TOPAZ FIELDS',
      5400:  'DIAMOND CORE',
      6500:  'OBSIDIAN SHELF',
      7700:  'MYTHRIL LAYER',
      9000:  'PLASMA RIFT',
      10400: 'THE VOID',
      11900: 'SINGULARITY...',
      14000: 'STARDUST DRIFTS',
      17000: 'NEBULA SHROUD',
      20500: 'QUASAR BURST',
      24500: 'PULSAR PULSE',
      29000: 'ANTIMATTER',
      34500: 'INTO DARKMATTER',
      41000: 'TACHYON STREAM',
      49000: 'QUANTUM REALM',
      59000: 'BEYOND INFINITY',
      72000: 'GENESIS STRATA',
      90000: 'ASCENSION',
      110000: 'ZENITH',
      130000: 'ETHEREAL LAYER',
      155000: 'OMEGA POINT',
      180000: 'CHRONOS DRIFT',
      210000: 'NIRVANA',
      240000: 'PARADOX FIELD',
      270000: 'ECLIPSE',
      300000: 'SUPERNOVA CORE',
      330000: 'COSMOS',
      360000: 'OBLIVION',
      380000: 'DIMENSION SHIFT',
      400000: 'OUTER REALM',
      420000: 'DIVINE LAYER',
      440000: 'ETERNAL',
      455000: 'TRANSCEND',
      470000: 'APEX',
      480000: 'ARCHON',
      490000: 'PRIMORDIAL',
      500000: 'CREATION',
    };
    for (const m in MILESTONES) {
      const md = +m;
      if (!game.milestones[md] && game.depth >= md) {
        game.milestones[md] = true;
        game.milestoneMsg = { text: MILESTONES[md], time: 2.2, maxTime: 2.2 };
      }
    }
    if (game.milestoneMsg) {
      game.milestoneMsg.time -= dt;
      if (game.milestoneMsg.time <= 0) game.milestoneMsg = null;
    }
  }

  function die() {
    game.carried = [];
    game.scene = 'dead';
    game.player.limp = 1;
    game.screenShake = 14;
  }

  // ---------- DRAW SURFACE ----------
  function drawSurface() {
    // sky gradient (stripes for pixel feel)
    const skyBands = [
      [0, '#0a0820'],
      [80, '#15123a'],
      [160, '#26204a'],
      [240, '#3a2c5a'],
      [320, '#5a3a6a'],
      [400, '#7a4860'],
    ];
    for (let i = 0; i < skyBands.length; i++) {
      const [y0, color] = skyBands[i];
      const y1 = i + 1 < skyBands.length ? skyBands[i + 1][0] : SURFACE_GROUND_Y;
      ctx.fillStyle = color;
      ctx.fillRect(0, y0, W, y1 - y0);
    }

    // moon
    const moonX = 640, moonY = 80;
    ctx.fillStyle = C.moon;
    ctx.fillRect(moonX, moonY, 40, 40);
    ctx.fillRect(moonX - 4, moonY + 4, 4, 32);
    ctx.fillRect(moonX + 40, moonY + 4, 4, 32);
    ctx.fillRect(moonX + 4, moonY - 4, 32, 4);
    ctx.fillRect(moonX + 4, moonY + 40, 32, 4);
    // moon craters
    ctx.fillStyle = C.moonShade;
    ctx.fillRect(moonX + 10, moonY + 10, 6, 4);
    ctx.fillRect(moonX + 22, moonY + 22, 8, 4);
    ctx.fillRect(moonX + 8, moonY + 26, 4, 4);
    // moon glow
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = C.moon;
    ctx.fillRect(moonX - 16, moonY - 16, 72, 72);
    ctx.globalAlpha = 1;

    // stars (deterministic positions, twinkle by time)
    for (let i = 0; i < 60; i++) {
      const sx = ((i * 137) % W);
      const sy = ((i * 53) % 280);
      // skip if near moon
      if (sx > moonX - 20 && sx < moonX + 60 && sy > moonY - 20 && sy < moonY + 60) continue;
      const twinkle = ((Math.floor(game.timeAcc * 4) + i) % 7 === 0);
      ctx.fillStyle = twinkle ? C.star : C.starDim;
      ctx.fillRect(sx, sy, twinkle ? 2 : 1, twinkle ? 2 : 1);
    }

    const camX = game.cameraX;

    // parallax mountains (3 layers)
    drawMountains(0.2, 320, C.mtnFar, camX);
    drawMountains(0.4, 360, C.mtnMid, camX);
    drawMountains(0.6, 400, C.mtnNear, camX);

    // distant trees on horizon (parallax)
    drawTreeRow(0.7, 390, camX);

    // ground (dirt under grass)
    ctx.fillStyle = C.dirtMid;
    ctx.fillRect(0, SURFACE_GROUND_Y + 6, W, H - SURFACE_GROUND_Y - 6);
    // dirt darker stripes
    ctx.fillStyle = C.dirtDeep;
    ctx.fillRect(0, SURFACE_GROUND_Y + 30, W, 4);
    ctx.fillRect(0, SURFACE_GROUND_Y + 60, W, 6);
    ctx.fillRect(0, SURFACE_GROUND_Y + 100, W, 8);
    // grass top
    ctx.fillStyle = C.grassTop;
    ctx.fillRect(0, SURFACE_GROUND_Y, W, 6);
    // grass tufts
    const ww = currentWorldWidth();
    for (let x = 0; x < ww; x += 14) {
      const sx = x - camX;
      if (sx > -16 && sx < W + 16) {
        ctx.fillStyle = C.grassDark;
        const tuftH = 2 + ((x * 17) % 3);
        ctx.fillRect(sx | 0, SURFACE_GROUND_Y - tuftH, 2, tuftH);
        if ((x % 28) === 0) {
          ctx.fillStyle = C.grassTop;
          ctx.fillRect((sx + 4) | 0, SURFACE_GROUND_Y - 1, 1, 1);
        }
      }
    }
    // small pebbles in dirt
    for (let i = 0; i < 30; i++) {
      const px = (i * 71) % ww - camX;
      const py = SURFACE_GROUND_Y + 14 + ((i * 23) % 80);
      if (px > -4 && px < W) {
        ctx.fillStyle = i % 2 ? C.dirtTop : C.dirtDeep;
        ctx.fillRect(px | 0, py | 0, 2, 2);
      }
    }
    // fence in middle of path
    // buildings
    drawBase(BASE_X - camX, SURFACE_GROUND_Y - BASE_H);
    drawMachine(MACHINE_X - camX, SURFACE_GROUND_Y - MACHINE_H);
    drawShop(SHOP_X - camX, SURFACE_GROUND_Y - SHOP_H);
    drawHole(HOLE_X - camX, SURFACE_GROUND_Y);

    // sign near hole
    drawSign(HOLE_X - camX - 80, SURFACE_GROUND_Y - 40, 'MINE');

    // extra houses + remote players on surface
    const remoteIds = Object.keys(net.remotePlayers);
    for (let i = 0; i < remoteIds.length; i++) {
      const sid = remoteIds[i];
      const rp = net.remotePlayers[sid];
      const hx = remoteHouseX(i);
      const pal = paletteFor(sid);
      const label = (rp && rp.name) ? rp.name.toUpperCase().slice(0, 6) : ('P' + (i + 2));
      drawRemoteHouse(hx - camX, SURFACE_GROUND_Y - BASE_H, pal);
      drawSign(hx - camX + BASE_W / 2 - 16, SURFACE_GROUND_Y - BASE_H - 18, label);
      if (rp && (rp.depth === 0 || rp.depth === undefined) && rp.alive !== false) {
        drawMiner(rp.x - camX, (rp.y !== undefined ? rp.y : SURFACE_GROUND_Y - 32), {
          walkPhase: 0,
          facing: 1,
          mode: 'surface',
          carryCount: (rp.carrying || []).length,
          tint: pal,
        });
        pixelText(label, rp.x - camX + 8, (rp.y || SURFACE_GROUND_Y - 32) - 14, 10, pal.helmet, 'center');
      }
    }

    // player
    const p = game.player;
    const idleBob = (Math.abs(p.vx) < 0.5 && p.onGround) ? Math.round(Math.sin(p.bobPhase * 4) * 1) : 0;
    drawMiner(p.x - camX, p.y, {
      walkPhase: p.walkPhase,
      facing: p.facing,
      idleBob,
      carryCount: game.carried.length,
      mode: 'surface',
      blink: p.blink,
    });
    if (net.connected && auth.username) {
      pixelText(auth.username.toUpperCase().slice(0, 6), p.x - camX + 8, p.y - 14, 10, C.helmet, 'center');
    }

    drawParticles(camX, 0);
    drawSurfaceHUD();
  }

  // A recolored house for a remote player
  function drawRemoteHouse(x, y, pal) {
    // roof in their color
    ctx.fillStyle = pal.helmet;
    ctx.beginPath();
    ctx.moveTo(x - 10, y);
    ctx.lineTo(x + BASE_W / 2, y - 36);
    ctx.lineTo(x + BASE_W + 10, y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = pal.helmetShade;
    ctx.beginPath();
    ctx.moveTo(x + BASE_W / 2, y - 36);
    ctx.lineTo(x + BASE_W + 10, y);
    ctx.lineTo(x + BASE_W, y);
    ctx.lineTo(x + BASE_W / 2 + 4, y - 28);
    ctx.closePath();
    ctx.fill();
    // wall
    ctx.fillStyle = C.baseWall;
    ctx.fillRect(x, y, BASE_W, BASE_H);
    ctx.fillStyle = C.baseWallShadow;
    for (let i = 0; i < 6; i++) ctx.fillRect(x, y + 4 + i * 22, BASE_W, 1);
    drawWindow(x + 14, y + 24, C.baseWindow);
    drawWindow(x + BASE_W - 38, y + 24, C.baseWindow);
    // door
    ctx.fillStyle = C.baseDoor;
    ctx.fillRect(x + BASE_W / 2 - 14, y + BASE_H - 50, 28, 50);
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(x + BASE_W / 2 - 14, y + BASE_H - 50, 28, 2);
    ctx.fillRect(x + BASE_W / 2 - 14, y + BASE_H - 50, 2, 50);
    ctx.fillRect(x + BASE_W / 2 + 12, y + BASE_H - 50, 2, 50);
    ctx.fillStyle = '#2a1610';
    ctx.fillRect(x + BASE_W / 2 - 10, y + BASE_H - 44, 20, 18);
    ctx.fillRect(x + BASE_W / 2 - 10, y + BASE_H - 22, 20, 18);
    // doorknob in their color
    ctx.fillStyle = pal.helmet;
    ctx.fillRect(x + BASE_W / 2 + 7, y + BASE_H - 26, 2, 2);
    // small flag
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x + BASE_W / 2 - 1, y - 50, 2, 14);
    ctx.fillStyle = pal.helmet;
    ctx.fillRect(x + BASE_W / 2 + 1, y - 50, 10, 6);
  }

  function drawMountains(parallax, baseY, color, camX) {
    const off = (camX * parallax) | 0;
    ctx.fillStyle = color;
    // pixelated mountain silhouette
    const peaks = [
      0, 20, 60, 0, 40, 80, 30, 0, 50, 70, 20, 60, 100, 40, 10, 60, 30, 0, 90, 40, 60, 20, 80, 30, 60
    ];
    const step = 60;
    ctx.beginPath();
    ctx.moveTo(-50, SURFACE_GROUND_Y);
    for (let i = 0; i < peaks.length; i++) {
      const x = i * step - (off % step);
      const y = baseY - peaks[i];
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W + 50, SURFACE_GROUND_Y);
    ctx.closePath();
    ctx.fill();
    // pixel ridge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (let i = 0; i < peaks.length; i++) {
      const x = i * step - (off % step);
      const y = baseY - peaks[i];
      ctx.fillRect(x, y, 2, 4);
    }
  }

  function drawTreeRow(parallax, baseY, camX) {
    const off = (camX * parallax) | 0;
    for (let i = 0; i < 30; i++) {
      const tx = i * 70 - (off % 70);
      // tree
      ctx.fillStyle = C.treeDark;
      ctx.fillRect(tx + 7, baseY - 2, 2, 4);
      // pine triangle
      for (let r = 0; r < 5; r++) {
        const w = 14 - r * 2;
        ctx.fillRect(tx + 2 + r, baseY - 4 - r * 4, w, 4);
      }
      ctx.fillStyle = C.treeMid;
      for (let r = 0; r < 5; r++) {
        const w = 14 - r * 2;
        ctx.fillRect(tx + 2 + r, baseY - 4 - r * 4, 2, 4);
      }
    }
  }

  function drawSign(x, y, text) {
    // post
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(x + 14, y + 14, 4, 24);
    // board
    ctx.fillStyle = '#6a4828';
    ctx.fillRect(x, y, 32, 16);
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x, y, 32, 2);
    ctx.fillRect(x, y + 14, 32, 2);
    ctx.fillRect(x, y, 2, 16);
    ctx.fillRect(x + 30, y, 2, 16);
    pixelText(text, x + 16, y + 4, 9, '#ffe080', 'center', false);
  }

  function drawBase(x, y) {
    // chimney
    ctx.fillStyle = '#3a2614';
    ctx.fillRect(x + BASE_W - 36, y - 30, 14, 30);
    ctx.fillStyle = '#5a3a22';
    ctx.fillRect(x + BASE_W - 36, y - 30, 14, 2);
    // chimney smoke
    const t = game.timeAcc;
    for (let i = 0; i < 4; i++) {
      const sy = y - 36 - i * 10 - Math.sin(t + i) * 2;
      const sx = x + BASE_W - 30 + Math.sin(t * 0.5 + i) * 4;
      const size = 4 + i;
      ctx.fillStyle = `rgba(200,200,210,${0.4 - i * 0.08})`;
      ctx.fillRect(sx | 0, sy | 0, size, size);
    }
    // roof
    ctx.fillStyle = C.baseRoof;
    ctx.beginPath();
    ctx.moveTo(x - 10, y);
    ctx.lineTo(x + BASE_W / 2, y - 36);
    ctx.lineTo(x + BASE_W + 10, y);
    ctx.closePath();
    ctx.fill();
    // roof shadow
    ctx.fillStyle = C.baseRoofShadow;
    ctx.beginPath();
    ctx.moveTo(x + BASE_W / 2, y - 36);
    ctx.lineTo(x + BASE_W + 10, y);
    ctx.lineTo(x + BASE_W, y);
    ctx.lineTo(x + BASE_W / 2 + 4, y - 28);
    ctx.closePath();
    ctx.fill();
    // roof shingle lines
    ctx.fillStyle = C.baseRoofShadow;
    for (let i = 0; i < 4; i++) {
      const sy = y - 30 + i * 8;
      const half = (y - sy) * (BASE_W / 2 + 10) / 36;
      ctx.fillRect((x + BASE_W / 2 - half) | 0, sy | 0, half * 2, 1);
    }
    // wall
    ctx.fillStyle = C.baseWall;
    ctx.fillRect(x, y, BASE_W, BASE_H);
    // wood plank lines
    ctx.fillStyle = C.baseWallShadow;
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(x, y + 4 + i * 22, BASE_W, 1);
    }
    // window left
    drawWindow(x + 14, y + 24, C.baseWindow);
    // window right
    drawWindow(x + BASE_W - 38, y + 24, C.baseWindow);
    // door
    ctx.fillStyle = C.baseDoor;
    ctx.fillRect(x + BASE_W / 2 - 14, y + BASE_H - 50, 28, 50);
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(x + BASE_W / 2 - 14, y + BASE_H - 50, 28, 2);
    ctx.fillRect(x + BASE_W / 2 - 14, y + BASE_H - 50, 2, 50);
    ctx.fillRect(x + BASE_W / 2 + 12, y + BASE_H - 50, 2, 50);
    // door panels
    ctx.fillStyle = '#2a1610';
    ctx.fillRect(x + BASE_W / 2 - 10, y + BASE_H - 44, 20, 18);
    ctx.fillRect(x + BASE_W / 2 - 10, y + BASE_H - 22, 20, 18);
    // door knob
    ctx.fillStyle = C.coin;
    ctx.fillRect(x + BASE_W / 2 + 7, y + BASE_H - 26, 2, 2);
    // door step
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x + BASE_W / 2 - 18, y + BASE_H, 36, 2);
    // welcome plank
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x + BASE_W / 2 - 12, y + BASE_H - 56, 24, 4);
    pixelText('HOME', x + BASE_W / 2, y + BASE_H - 56, 8, '#ffe080', 'center', false);
  }

  function drawWindow(x, y, color) {
    // frame
    ctx.fillStyle = C.baseWindowFrame;
    ctx.fillRect(x - 2, y - 2, 28, 24);
    // glass
    const flicker = (Math.floor(game.timeAcc * 6) % 11 === 0) ? '#fff7a8' : color;
    ctx.fillStyle = flicker;
    ctx.fillRect(x, y, 24, 20);
    // cross
    ctx.fillStyle = C.baseWindowFrame;
    ctx.fillRect(x + 11, y, 2, 20);
    ctx.fillRect(x, y + 9, 24, 2);
    // glow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = color;
    ctx.fillRect(x - 4, y - 4, 32, 28);
    ctx.globalAlpha = 1;
  }

  function drawMachine(x, y) {
    // Industrial conversion machine — metallic grey box with pipes and gauges.
    const w = MACHINE_W, h = MACHINE_H;
    // main body
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(x, y, w, 6);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(x, y + h - 4, w, 4);
    // riveted panels
    for (let py = y + 12; py < y + h - 12; py += 18) {
      for (let px = x + 6; px < x + w - 6; px += 18) {
        ctx.fillStyle = '#1a1a24';
        ctx.fillRect(px, py, 2, 2);
      }
    }
    // top pipes/chimneys
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(x + 18, y - 22, 10, 22);
    ctx.fillRect(x + w - 28, y - 30, 10, 30);
    ctx.fillStyle = '#2a2a34';
    ctx.fillRect(x + 18, y - 22, 10, 3);
    ctx.fillRect(x + w - 28, y - 30, 10, 3);
    // steam puffs
    const t = game.timeAcc;
    for (let i = 0; i < 3; i++) {
      const sy = y - 30 - i * 8 - Math.sin(t * 1.2 + i) * 2;
      const sx = x + 22 + Math.sin(t * 0.8 + i * 0.7) * 2;
      ctx.fillStyle = `rgba(220,220,230,${0.4 - i * 0.1})`;
      ctx.fillRect(sx, sy, 5 + i, 5 + i);
      const sy2 = y - 38 - i * 8 - Math.sin(t * 1.4 + i + 3) * 2;
      const sx2 = x + w - 25 + Math.sin(t * 0.9 + i) * 2;
      ctx.fillStyle = `rgba(220,220,230,${0.4 - i * 0.1})`;
      ctx.fillRect(sx2, sy2, 5 + i, 5 + i);
    }
    // sign on top
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(x + 6, y - 16, w - 12, 14);
    ctx.strokeStyle = '#80c0ff';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 6.5, y - 15.5, w - 13, 13);
    pixelText('CONVERTER', x + w / 2, y - 14, 11, '#80c0ff', 'center');
    // gauges (3 round-ish dials)
    const gaugeY = y + 30;
    for (let i = 0; i < 3; i++) {
      const gx = x + 14 + i * 32;
      ctx.fillStyle = '#1a1a24';
      ctx.fillRect(gx, gaugeY, 20, 20);
      ctx.fillStyle = '#3a4a6a';
      ctx.fillRect(gx + 2, gaugeY + 2, 16, 16);
      // needle
      const angle = (t * 0.7 + i) % (Math.PI * 2);
      const nx = gx + 10 + Math.cos(angle) * 7;
      const ny = gaugeY + 10 + Math.sin(angle) * 7;
      ctx.strokeStyle = i === 1 ? '#ffe080' : '#80c0ff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(gx + 10, gaugeY + 10);
      ctx.lineTo(nx, ny);
      ctx.stroke();
    }
    // door / entry opening (glowing blue)
    const dx = x + w / 2 - 14;
    const dy = y + h - 56;
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(dx, dy, 28, 56);
    // glow inside door cycling
    const glowPulse = 0.5 + 0.5 * Math.sin(t * 3);
    ctx.fillStyle = `rgba(120,200,255,${0.4 + 0.4 * glowPulse})`;
    ctx.fillRect(dx + 4, dy + 6, 20, 44);
    ctx.fillStyle = '#80c0ff';
    ctx.fillRect(dx, dy, 28, 2);
    ctx.fillRect(dx, dy, 2, 56);
    ctx.fillRect(dx + 26, dy, 2, 56);
    // ground bolts
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(x - 4, y + h - 8, w + 8, 8);
  }

  function drawShop(x, y) {
    // roof
    ctx.fillStyle = C.shopRoof;
    ctx.fillRect(x - 8, y - 10, SHOP_W + 16, 14);
    ctx.fillStyle = '#5a3878';
    ctx.fillRect(x - 8, y - 10, SHOP_W + 16, 2);
    // wall
    ctx.fillStyle = C.shopWall;
    ctx.fillRect(x, y, SHOP_W, SHOP_H);
    ctx.fillStyle = C.shopWallShadow;
    for (let i = 0; i < 5; i++) ctx.fillRect(x, y + 6 + i * 26, SHOP_W, 1);
    // brick texture
    for (let row = 0; row < 10; row++) {
      for (let col = 0; col < 8; col++) {
        const bx = x + col * 18 + (row % 2 ? 9 : 0);
        const by = y + row * 14;
        if (bx + 18 < x + SHOP_W && by + 14 < y + SHOP_H) {
          ctx.fillStyle = C.shopWallShadow;
          ctx.fillRect(bx, by, 18, 1);
          ctx.fillRect(bx, by, 1, 14);
        }
      }
    }
    // big sign
    const signY = y - 42;
    ctx.fillStyle = C.shopSign;
    ctx.fillRect(x + 5, signY, SHOP_W - 10, 28);
    // sign neon border (flickering pink/yellow)
    const neonOn = Math.floor(game.timeAcc * 8) % 17 !== 0;
    ctx.fillStyle = neonOn ? C.shopNeon : '#6a3060';
    ctx.fillRect(x + 5, signY, SHOP_W - 10, 2);
    ctx.fillRect(x + 5, signY + 26, SHOP_W - 10, 2);
    ctx.fillRect(x + 5, signY, 2, 28);
    ctx.fillRect(x + SHOP_W - 7, signY, 2, 28);
    pixelText('SHOP', x + SHOP_W / 2, signY + 8, 16, C.shopSignText, 'center');
    // sign glow
    if (neonOn) {
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = C.shopNeon;
      ctx.fillRect(x, signY - 4, SHOP_W, 36);
      ctx.globalAlpha = 1;
    }
    // sign posts
    ctx.fillStyle = '#2a1c40';
    ctx.fillRect(x + 8, signY + 28, 2, 6);
    ctx.fillRect(x + SHOP_W - 10, signY + 28, 2, 6);
    // window
    drawShopWindow(x + 18, y + 24);
    drawShopWindow(x + SHOP_W - 50, y + 24);
    // door
    ctx.fillStyle = '#1a0820';
    ctx.fillRect(x + SHOP_W / 2 - 16, y + SHOP_H - 56, 32, 56);
    ctx.fillStyle = '#3a1c50';
    ctx.fillRect(x + SHOP_W / 2 - 16, y + SHOP_H - 56, 32, 2);
    ctx.fillRect(x + SHOP_W / 2 - 16, y + SHOP_H - 56, 2, 56);
    ctx.fillRect(x + SHOP_W / 2 + 14, y + SHOP_H - 56, 2, 56);
    // door window
    ctx.fillStyle = C.shopWindow;
    ctx.fillRect(x + SHOP_W / 2 - 8, y + SHOP_H - 48, 16, 16);
    ctx.fillStyle = '#1a0820';
    ctx.fillRect(x + SHOP_W / 2, y + SHOP_H - 48, 1, 16);
    ctx.fillRect(x + SHOP_W / 2 - 8, y + SHOP_H - 40, 16, 1);
    // doorknob
    ctx.fillStyle = C.coin;
    ctx.fillRect(x + SHOP_W / 2 + 9, y + SHOP_H - 28, 2, 2);
  }

  function drawShopWindow(x, y) {
    ctx.fillStyle = '#1a0820';
    ctx.fillRect(x - 2, y - 2, 28, 24);
    ctx.fillStyle = C.shopWindow;
    ctx.fillRect(x, y, 24, 20);
    ctx.fillStyle = '#1a0820';
    ctx.fillRect(x + 11, y, 2, 20);
    ctx.fillRect(x, y + 9, 24, 2);
    // glow
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = C.shopWindow;
    ctx.fillRect(x - 4, y - 4, 32, 28);
    ctx.globalAlpha = 1;
  }

  function drawHole(x, y) {
    // wooden frame
    ctx.fillStyle = C.holeFrame;
    ctx.fillRect(x - 8, y - 14, HOLE_W + 16, 14);
    ctx.fillStyle = C.holeFrameDark;
    ctx.fillRect(x - 8, y - 14, HOLE_W + 16, 3);
    ctx.fillRect(x - 8, y - 4, HOLE_W + 16, 2);
    // plank divisions
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = C.holeFrameDark;
      ctx.fillRect(x - 6 + i * 28, y - 14, 2, 14);
    }
    // dark hole
    ctx.fillStyle = '#000';
    ctx.fillRect(x, y, HOLE_W, 140);
    // hole interior gradient (top edge lit)
    const grd = ctx.createLinearGradient(0, y, 0, y + 80);
    grd.addColorStop(0, 'rgba(60,40,20,0.6)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(x, y, HOLE_W, 80);
    // ropes / pulley
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x - 10, y - 30, HOLE_W + 20, 4);
    ctx.fillRect(x - 14, y - 34, 6, 14);
    ctx.fillRect(x + HOLE_W + 8, y - 34, 6, 14);
    // pulley wheel
    ctx.fillStyle = '#6a4828';
    ctx.fillRect(x + HOLE_W / 2 - 5, y - 30, 10, 8);
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x + HOLE_W / 2 - 1, y - 28, 2, 4);
    // rope dangling
    ctx.fillStyle = '#aa8848';
    ctx.fillRect(x + HOLE_W / 2 - 1, y - 22, 2, 30);
    // prompt
    if ((Math.floor(game.timeAcc * 4) % 2) === 0) {
      pixelText('[S] DESCEND', x + HOLE_W / 2, y - 56, 10, '#fff', 'center');
    }
  }

  // ---------- DRAW SHAFT ----------
  function drawShaft() {
    // background color based on depth
    const t = Math.min(1, game.depth / 1400);
    const r = Math.round(40 * (1 - t) + 0 * t);
    const g = Math.round(28 * (1 - t) + 0 * t);
    const b = Math.round(18 * (1 - t) + 4 * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, W, H);

    // sky strip at top if shallow
    if (game.depth < 100) {
      const skyA = 1 - game.depth / 100;
      ctx.fillStyle = `rgba(26,21,56,${skyA})`;
      ctx.fillRect(0, 0, W, 40);
      // hole frame at top
      ctx.fillStyle = `rgba(58,40,32,${skyA})`;
      ctx.fillRect(SHAFT_LEFT - 8, 0, SHAFT_RIGHT - SHAFT_LEFT + 16, 8);
    }

    // shaft walls
    drawShaftWalls();

    // ore clusters (drawn before player but lit by lamp)
    const playerScreenY = PLAYER_SHAFT_Y;
    const grabSet = new Set((game.grabbable || []).map(g => g.ore));
    for (const c of game.oreClusters) {
      const baseScreenY = (c.depth - game.depth) + playerScreenY;
      if (baseScreenY < -50 || baseScreenY > H + 50) continue;
      for (const o of c.ores) {
        if (o.collected) continue;
        const wallX = c.side === 'left' ? SHAFT_LEFT - 4 + o.ox : SHAFT_RIGHT - 6 + o.ox;
        const sy = baseScreenY + o.oy;
        const ot = ORE_TYPES[c.type];
        // dark rock backing — makes the ore look like it's bulging out of the wall
        ctx.fillStyle = C.wallShadow;
        if (c.side === 'left') {
          ctx.fillRect(SHAFT_LEFT - 8, sy - 1, 8, 8);
        } else {
          ctx.fillRect(SHAFT_RIGHT, sy - 1, 8, 8);
        }
        // pulsing glow for rare ores
        if (ot.glow) {
          const pulse = 0.5 + 0.3 * Math.sin(game.timeAcc * 4 + c.depth);
          ctx.globalAlpha = 0.5 * pulse;
          ctx.fillStyle = ot.glow;
          ctx.fillRect(wallX - 3, sy - 3, 12, 12);
          ctx.globalAlpha = 0.3 * pulse;
          ctx.fillRect(wallX - 6, sy - 6, 18, 18);
          ctx.globalAlpha = 1;
        }
        // grabbable highlight ring (pulsing white)
        if (grabSet.has(o)) {
          const pulse = 0.5 + 0.5 * Math.sin(game.timeAcc * 8);
          ctx.globalAlpha = 0.4 + 0.4 * pulse;
          ctx.fillStyle = '#fff';
          ctx.fillRect(wallX - 2, sy - 2, 10, 1);
          ctx.fillRect(wallX - 2, sy + 7, 10, 1);
          ctx.fillRect(wallX - 2, sy - 2, 1, 10);
          ctx.fillRect(wallX + 7, sy - 2, 1, 10);
          ctx.globalAlpha = 1;
        }
        // ore body
        ctx.fillStyle = ot.color;
        ctx.fillRect(wallX, sy, 6, 6);
        // edge shadow
        ctx.fillStyle = ot.edge;
        ctx.fillRect(wallX, sy + 5, 6, 1);
        ctx.fillRect(wallX + 5, sy, 1, 6);
        // specular highlight
        ctx.fillStyle = ot.spec;
        ctx.fillRect(wallX + 1, sy + 1, 2, 1);
        ctx.fillRect(wallX + 1, sy + 1, 1, 2);
      }
    }

    // dust particles
    drawDust();

    // remote players in the shaft — position by depth relative to us
    const remoteIds2 = Object.keys(net.remotePlayers);
    for (let i = 0; i < remoteIds2.length; i++) {
      const sid = remoteIds2[i];
      const rp = net.remotePlayers[sid];
      if (!rp || !rp.depth || rp.depth <= 0 || rp.alive === false) continue;
      const screenY = PLAYER_SHAFT_Y + (rp.depth - game.depth);
      if (screenY < -40 || screenY > H + 40) continue;
      const pal = paletteFor(sid);
      drawMiner(rp.x, screenY, {
        walkPhase: 0,
        facing: 1,
        carryCount: (rp.carrying || []).length,
        mode: 'shaft',
        tint: pal,
      });
      const labelS = (rp.name) ? rp.name.toUpperCase().slice(0, 6) : ('P' + (i + 2));
      pixelText(labelS, rp.x + 8, screenY - 14, 10, pal.helmet, 'center');
    }

    // player
    const p = game.player;
    const ascending = input('w') || input('arrowup');
    drawMiner(p.x, PLAYER_SHAFT_Y, {
      walkPhase: p.walkPhase,
      facing: p.facing,
      carryCount: game.carried.length,
      mode: 'shaft',
      mining: Math.abs(p.vx) > 1,
      ascending,
      blink: p.blink,
    });

    // Soft vignette darkness, transparent right around the player so they and the
    // nearby ores are NEVER hidden. The gradient only adds darkness as you go
    // outward — it doesn't punch holes or cover the lamp area.
    if (game.depth > 100) {
      const darkness = Math.min(0.55, 0.05 + game.depth / 4000 * 0.45);
      const lampX = p.x + p.w / 2 + (p.facing > 0 ? 2 : -2);
      const lampY = PLAYER_SHAFT_Y + 6;
      const grd = ctx.createRadialGradient(lampX, lampY, 90, lampX, lampY, 360);
      grd.addColorStop(0, 'rgba(0,0,0,0)');
      grd.addColorStop(0.4, `rgba(0,0,0,${darkness * 0.35})`);
      grd.addColorStop(1, `rgba(0,0,0,${darkness})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
      // warm glow around the lamp itself — purely additive
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const grd2 = ctx.createRadialGradient(lampX, lampY, 8, lampX, lampY, 110);
      grd2.addColorStop(0, 'rgba(255,220,140,0.22)');
      grd2.addColorStop(1, 'rgba(255,200,100,0)');
      ctx.fillStyle = grd2;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    drawParticles(0, 0);

    // [SPACE] GRAB <name> prompt when ores are in range
    if (game.grabbable && game.grabbable.length > 0) {
      const full = game.carried.length >= game.carriedMax;
      // pick the highest-value grabbable to display its name
      const best = game.grabbable.reduce((b, g) =>
        (!b || ORE_TYPES[g.cluster.type].value > ORE_TYPES[b.cluster.type].value) ? g : b, null);
      const oreName = best ? ORE_TYPES[best.cluster.type].name : '';
      const label = full ? `CARRY FULL` : `[SPACE] GRAB ${oreName}`;
      const color = full ? '#ff8080' : '#ffe080';
      const px = p.x + p.w / 2;
      const py = PLAYER_SHAFT_Y - 18;
      const tw = label.length * 7 + 14;
      const bob = Math.sin(game.timeAcc * 6) * 2;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(px - tw / 2, py + bob, tw, 14);
      ctx.fillStyle = color;
      ctx.fillRect(px - tw / 2, py + bob, tw, 1);
      ctx.fillRect(px - tw / 2, py + bob + 13, tw, 1);
      pixelText(label, px, py + bob + 2, 10, color, 'center');
    }

    drawShaftHUD();

    if (game.milestoneMsg) {
      const m = game.milestoneMsg;
      const a = Math.min(1, m.time / 0.4);
      ctx.globalAlpha = a;
      panel(W / 2 - 160, H / 2 - 30, 320, 50);
      pixelText(m.text, W / 2, H / 2 - 18, 20, '#ffe080', 'center');
      ctx.globalAlpha = 1;
    }
  }

  function drawShaftWalls() {
    const tile = 20;
    const depthInt = Math.floor(game.depth);
    const offset = depthInt % tile;
    for (let y = -tile; y < H + tile; y += tile) {
      const wy = y - offset;
      const rowIdx = Math.floor((depthInt + y) / tile);
      for (let x = 0; x < SHAFT_LEFT; x += tile) {
        const dark = (rowIdx + (x / tile)) % 2 === 0;
        ctx.fillStyle = dark ? C.wallA : C.wallB;
        ctx.fillRect(x, wy, tile, tile);
        // pixel inner detail
        ctx.fillStyle = C.wallShadow;
        ctx.fillRect(x, wy, tile, 1);
        ctx.fillRect(x, wy, 1, tile);
        // bedrock chunks
        ctx.fillStyle = C.wallHighlight;
        ctx.fillRect(x + 4, wy + 5, 2, 2);
        ctx.fillRect(x + 12, wy + 14, 3, 2);
        ctx.fillStyle = C.wallShadow;
        ctx.fillRect(x + 8, wy + 10, 2, 1);
        ctx.fillRect(x + 14, wy + 6, 1, 3);
      }
      for (let x = SHAFT_RIGHT; x < W; x += tile) {
        const dark = (rowIdx + (x / tile)) % 2 === 0;
        ctx.fillStyle = dark ? C.wallA : C.wallB;
        ctx.fillRect(x, wy, tile, tile);
        ctx.fillStyle = C.wallShadow;
        ctx.fillRect(x, wy, tile, 1);
        ctx.fillRect(x, wy, 1, tile);
        ctx.fillStyle = C.wallHighlight;
        ctx.fillRect(x + 4, wy + 5, 2, 2);
        ctx.fillRect(x + 12, wy + 14, 3, 2);
        ctx.fillStyle = C.wallShadow;
        ctx.fillRect(x + 8, wy + 10, 2, 1);
        ctx.fillRect(x + 14, wy + 6, 1, 3);
      }
    }

    // wooden support beams every 200 px depth
    const beamSpacing = 200;
    const firstBeam = Math.floor(game.depth / beamSpacing) * beamSpacing;
    for (let b = firstBeam; b < game.depth + 600; b += beamSpacing) {
      const by = (b - game.depth) + PLAYER_SHAFT_Y;
      if (by < -30 || by > H + 30) continue;
      // horizontal beam
      ctx.fillStyle = C.wallSupport;
      ctx.fillRect(SHAFT_LEFT - 4, by - 8, SHAFT_RIGHT - SHAFT_LEFT + 8, 4);
      ctx.fillStyle = C.wallSupportDark;
      ctx.fillRect(SHAFT_LEFT - 4, by - 8, SHAFT_RIGHT - SHAFT_LEFT + 8, 1);
      ctx.fillRect(SHAFT_LEFT - 4, by - 5, SHAFT_RIGHT - SHAFT_LEFT + 8, 1);
      // vertical posts
      ctx.fillStyle = C.wallSupport;
      ctx.fillRect(SHAFT_LEFT - 4, by - 30, 4, 22);
      ctx.fillRect(SHAFT_RIGHT, by - 30, 4, 22);
      ctx.fillStyle = C.wallSupportDark;
      ctx.fillRect(SHAFT_LEFT - 4, by - 30, 1, 22);
      ctx.fillRect(SHAFT_RIGHT, by - 30, 1, 22);
      // bolts
      ctx.fillStyle = '#1a0e08';
      ctx.fillRect(SHAFT_LEFT - 2, by - 6, 1, 1);
      ctx.fillRect(SHAFT_RIGHT + 2, by - 6, 1, 1);
      // depth marking
      pixelText(b + 'm', SHAFT_LEFT - 12, by - 22, 8, '#ffe080', 'right', false);
    }

    // shaft inner edge
    ctx.fillStyle = '#000';
    ctx.fillRect(SHAFT_LEFT - 2, 0, 2, H);
    ctx.fillRect(SHAFT_RIGHT, 0, 2, H);
    ctx.fillStyle = C.wallShadow;
    ctx.fillRect(SHAFT_LEFT, 0, 1, H);
    ctx.fillRect(SHAFT_RIGHT - 1, 0, 1, H);

    // dripping water
    const dripSeed = Math.floor(game.depth / 25);
    for (let i = 0; i < 6; i++) {
      const seed = (dripSeed + i * 7);
      const side = seed % 2;
      const dx = side === 0 ? SHAFT_LEFT - 4 : SHAFT_RIGHT + 2;
      const dy = ((seed * 13) % (H - 20)) + 10;
      // drip body
      ctx.fillStyle = '#3a6a98';
      ctx.fillRect(dx, dy, 2, 4);
      ctx.fillStyle = '#5a8ac8';
      ctx.fillRect(dx, dy, 2, 1);
      // splash trail
      ctx.fillStyle = 'rgba(80,130,180,0.4)';
      ctx.fillRect(dx, dy + 4, 1, 6);
    }

    // cracks
    for (let i = 0; i < 8; i++) {
      const seed = (Math.floor(game.depth / 60) + i * 5);
      const cx = (seed % 3 === 0)
        ? (seed * 7) % (SHAFT_LEFT - 20)
        : SHAFT_RIGHT + 10 + (seed * 7) % (W - SHAFT_RIGHT - 30);
      const cy = (seed * 11) % H;
      ctx.strokeStyle = '#1a0c06';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + 4, cy + 3);
      ctx.lineTo(cx + 9, cy + 1);
      ctx.lineTo(cx + 14, cy + 5);
      ctx.stroke();
    }
  }

  // ---------- HUD ----------
  function drawCoin(x, y, size = 12) {
    ctx.fillStyle = C.coin;
    ctx.fillRect(x, y, size, size);
    ctx.fillStyle = C.coinShade;
    ctx.fillRect(x, y + size - 3, size, 3);
    ctx.fillRect(x + size - 3, y, 3, size);
    ctx.fillStyle = '#fff8a0';
    ctx.fillRect(x + 2, y + 2, 3, 3);
    ctx.fillStyle = '#1a1408';
    ctx.fillRect(x + size / 2 - 1, y + 2, 2, size - 4);
    ctx.fillRect(x + 2, y + size / 2 - 1, size - 4, 2);
  }

  function drawOreIcon(x, y, type, size = 10) {
    const ot = ORE_TYPES[type];
    if (ot.glow) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = ot.glow;
      ctx.fillRect(x - 2, y - 2, size + 4, size + 4);
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = ot.color;
    ctx.fillRect(x, y, size, size);
    ctx.fillStyle = ot.edge;
    ctx.fillRect(x, y + size - 2, size, 2);
    ctx.fillRect(x + size - 2, y, 2, size);
    ctx.fillStyle = ot.spec;
    ctx.fillRect(x + 1, y + 1, 3, 2);
  }

  function drawSurfaceHUD() {
    // money
    panel(8, 8, 150, 32);
    drawCoin(16, 18, 12);
    pixelText('$' + fmtShort(game.money), 36, 16, 16, '#fff');

    // carried + income
    panel(W - 220, 8, 212, 32);
    drawOreIcon(W - 210, 19, 'coal', 10);
    pixelText(`${game.carried.length}/${game.carriedMax}`, W - 196, 16, 14, '#fff');
    pixelText(`+$${fmtShort(passiveIncome())}/s`, W - 140, 16, 14, C.textHi);

    if (game.maxDepth > 0) {
      panel(W / 2 - 80, 8, 160, 28);
      pixelText('MAX ' + Math.floor(game.maxDepth) + 'm', W / 2, 14, 14, '#aac8ff', 'center');
    }

    // controls hint at bottom
    panel(W / 2 - 200, H - 30, 400, 24);
    pixelText('[WASD/ARROWS] move  [W/UP] enter  [S/DOWN] descend', W / 2, H - 26, 11, C.textDim, 'center');

    // multiplayer status
    const online = 1 + Object.keys(net.remotePlayers).length;
    const status = net.connected ? `ONLINE  ${online} player${online > 1 ? 's' : ''}` : 'OFFLINE';
    panel(8, H - 30, 160, 24);
    ctx.fillStyle = net.connected ? '#5fdc5f' : '#dc5f5f';
    ctx.fillRect(16, H - 22, 8, 8);
    pixelText(status, 30, H - 26, 11, '#fff');
  }

  function drawShaftHUD() {
    panel(8, 8, 150, 32);
    drawCoin(16, 18, 12);
    pixelText('$' + fmtShort(game.money), 36, 16, 16, '#fff');

    // O2 + HP stacked
    const oxPct = game.oxygen / game.oxygenMax;
    const hpPct = game.hp / game.maxHp;
    panel(W / 2 - 140, 6, 280, 54);
    pixelText('O2', W / 2 - 130, 12, 12, '#fff');
    const barX = W / 2 - 100, barW = 220, barH = 10;
    // O2 bar
    ctx.fillStyle = '#1a1020';
    ctx.fillRect(barX, 14, barW, barH);
    let oxColor = '#5fdc5f', oxEdge = '#2a8a2a';
    if (oxPct < 0.25) {
      const flash = (Math.floor(game.timeAcc * 6) % 2) === 0;
      oxColor = flash ? '#ff4040' : '#aa2020';
      oxEdge = '#5a0a0a';
    } else if (oxPct < 0.5) { oxColor = '#dcdc5f'; oxEdge = '#8a8a2a'; }
    ctx.fillStyle = oxColor;
    ctx.fillRect(barX + 1, 15, (barW - 2) * oxPct, barH - 2);
    ctx.fillStyle = oxEdge;
    ctx.fillRect(barX + 1, 14 + barH - 3, (barW - 2) * oxPct, 2);
    // HP bar
    pixelText('HP', W / 2 - 130, 36, 12, '#fff');
    ctx.fillStyle = '#1a1020';
    ctx.fillRect(barX, 38, barW, barH);
    const hpFlash = game.suffocating && (Math.floor(game.timeAcc * 8) % 2) === 0;
    let hpColor = hpFlash ? '#ffaaaa' : '#ff4848';
    if (hpPct < 0.25) hpColor = hpFlash ? '#ffffff' : '#ff2020';
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX + 1, 39, (barW - 2) * hpPct, barH - 2);
    ctx.fillStyle = '#7a1010';
    ctx.fillRect(barX + 1, 38 + barH - 3, (barW - 2) * hpPct, 2);
    if (game.suffocating) {
      pixelText('SUFFOCATING!', W / 2 + 12, 36, 11, '#ff4040');
    }

    panel(W - 220, 8, 212, 32);
    drawOreIcon(W - 210, 19, 'coal', 10);
    pixelText(`${game.carried.length}/${game.carriedMax}`, W - 196, 16, 14, '#fff');
    pixelText(`+$${fmtShort(passiveIncome())}/s`, W - 140, 16, 14, C.textHi);

    // depth at bottom
    panel(W / 2 - 100, H - 50, 200, 36);
    pixelText('DEPTH', W / 2, H - 46, 11, C.textDim, 'center');
    pixelText(Math.floor(game.depth) + 'm', W / 2, H - 32, 18, '#fff', 'center');

    // descent / ascent speed bottom-left
    panel(8, H - 68, 150, 54);
    pixelText(`v ${currentDescentSpeed().toFixed(1)} px/s`, 14, H - 62, 11, '#aac8ff');
    pixelText(`^ ${currentAscentSpeed().toFixed(1)} px/s`, 14, H - 46, 11, '#ffd060');
    pixelText(`W:${game.weights} B:${game.belts}`, 14, H - 28, 10, C.textDim);
  }

  // ---------- BASE INTERIOR ----------
  function drawBaseScreen() {
    if (game.visit) { drawVisitScreen(); return; }
    // wallpaper
    ctx.fillStyle = '#3a2418';
    ctx.fillRect(0, 0, W, H);
    // wallpaper stripes
    ctx.fillStyle = '#4a2e1c';
    for (let x = 0; x < W; x += 24) ctx.fillRect(x, 0, 12, H - 80);
    // wall trim
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(0, H - 100, W, 4);
    // wood floor
    ctx.fillStyle = '#6a4828';
    ctx.fillRect(0, H - 96, W, 96);
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(0, H - 88 + i * 12, W, 1);
    }
    for (let x = 0; x < W; x += 90) {
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(x + ((x / 90 | 0) % 2 ? 45 : 0), H - 96, 1, 96);
    }
    // floor highlight (light from windows)
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#ffdf6f';
    ctx.fillRect(80, H - 96, 100, 96);
    ctx.fillRect(W - 180, H - 96, 100, 96);
    ctx.globalAlpha = 1;

    // back wall furniture: shelves with placed ores
    pixelText('OVERFLOW MINE TROVE', W / 2, 14, 22, '#ffe080', 'center');
    pixelText('click empty slot to place, click ore to take it back', W / 2, 42, 12, C.textDim, 'center');
    pixelText('total income: +$' + fmtShort(passiveIncome()) + '/s', W / 2, 60, 14, C.textHi, 'center');

    // GROWS-DOWN GRID: first several upgrades take up the empty vertical space
    // (no scroll), then beyond the cap rows scroll inside the viewport.
    const slotCount = placedSlotCount();
    if (game.placed.length < slotCount) {
      const extra = slotCount - game.placed.length;
      for (let i = 0; i < extra; i++) game.placed.push(null);
    }
    const cols = 6;
    const totalRows = Math.ceil(slotCount / cols);
    const gap = 8;
    const gridY = 100;
    // grid ends just above the action buttons row (we keep buttons at H-130).
    const gridBottomLimit = H - 130 - 12;
    const availH = gridBottomLimit - gridY;
    // Show up to 5 rows visible (= 30 slots = first 3 trove upgrades).
    const MAX_VISIBLE = 5;
    const visibleRows = Math.min(MAX_VISIBLE, totalRows);
    let slotSize = 80;
    if (visibleRows * (slotSize + gap) - gap > availH) {
      slotSize = Math.max(48, Math.floor((availH + gap) / visibleRows) - gap);
    }
    const viewportH = visibleRows * (slotSize + gap) - gap;
    const contentH = totalRows * (slotSize + gap) - gap;
    const gridW = cols * (slotSize + gap) - gap;
    const gridX = (W - gridW) / 2;
    const maxScroll = Math.max(0, contentH - viewportH);

    // handle wheel scroll if hovering grid viewport
    const inGridArea = mouse.x >= gridX - 12 && mouse.x <= gridX + gridW + 12 &&
                       mouse.y >= gridY - 10 && mouse.y <= gridY + viewportH + 10;
    if (inGridArea && mouse.wheelDelta !== 0) {
      game.troveScrollY += mouse.wheelDelta;
    }
    game.troveScrollY = Math.max(0, Math.min(maxScroll, game.troveScrollY));
    const scrollY = game.troveScrollY;

    // shelf backing for viewport
    ctx.fillStyle = '#5a3a22';
    ctx.fillRect(gridX - 12, gridY - 10, gridW + 24, viewportH + 20);
    ctx.fillStyle = '#3a2414';
    ctx.fillRect(gridX - 12, gridY - 10, gridW + 24, 4);
    ctx.fillRect(gridX - 12, gridY + viewportH + 6, gridW + 24, 4);

    // clip to viewport then draw slots
    ctx.save();
    ctx.beginPath();
    ctx.rect(gridX - 4, gridY - 4, gridW + 8, viewportH + 8);
    ctx.clip();

    for (let i = 0; i < slotCount; i++) {
      const cx = i % cols;
      const cy = (i / cols) | 0;
      const sx = gridX + cx * (slotSize + gap);
      const sy = gridY + cy * (slotSize + gap) - scrollY;
      // skip if entirely outside viewport
      if (sy + slotSize < gridY - 4 || sy > gridY + viewportH + 4) continue;

      const hovered = mouse.x >= sx && mouse.x <= sx + slotSize &&
                      mouse.y >= sy && mouse.y <= sy + slotSize &&
                      mouse.y >= gridY && mouse.y <= gridY + viewportH;
      const occupied = game.placed[i] !== null;
      const isDropTarget = game.drag && game.drag.source === 'carried' && !occupied;

      // slot background — highlight when valid drop target hovered
      let bgColor = '#1a0e08';
      if (hovered) {
        if (isDropTarget) bgColor = '#4a3a18';
        else if (occupied || game.carried.length > 0) bgColor = '#3a2818';
      }
      ctx.fillStyle = bgColor;
      ctx.fillRect(sx, sy, slotSize, slotSize);
      // inner frame
      ctx.fillStyle = isDropTarget && hovered ? '#ffe080' : '#8a5a30';
      ctx.fillRect(sx, sy, slotSize, 2);
      ctx.fillRect(sx, sy + slotSize - 2, slotSize, 2);
      ctx.fillRect(sx, sy, 2, slotSize);
      ctx.fillRect(sx + slotSize - 2, sy, 2, slotSize);
      ctx.fillStyle = '#5a3818';
      ctx.fillRect(sx + 2, sy + 2, slotSize - 4, 1);
      ctx.fillRect(sx + 2, sy + 2, 1, slotSize - 4);

      const o = game.placed[i];
      const sc = slotSize / 80;
      const showLabels = slotSize >= 60;
      if (o) {
        const ot = ORE_TYPES[o];
        const pedW = Math.round(44 * sc), pedH = Math.round(8 * sc);
        const pedX = sx + Math.round((slotSize - pedW) / 2);
        const pedY = sy + slotSize - Math.round(24 * sc);
        ctx.fillStyle = '#3a2210';
        ctx.fillRect(pedX, pedY, pedW, pedH);
        ctx.fillStyle = '#1a0e08';
        ctx.fillRect(pedX, pedY + pedH, pedW, 2);
        if (ot.glow) {
          const pulse = 0.6 + 0.3 * Math.sin(game.timeAcc * 3 + i);
          ctx.globalAlpha = 0.4 * pulse;
          ctx.fillStyle = ot.glow;
          ctx.fillRect(sx + Math.round(10 * sc), sy + Math.round(16 * sc),
                       Math.round(60 * sc), Math.round(30 * sc));
          ctx.globalAlpha = 1;
        }
        const gemW = Math.max(10, Math.round(24 * sc));
        const gemH = Math.max(8, Math.round(18 * sc));
        const gemX = sx + Math.round((slotSize - gemW) / 2);
        const gemY = sy + Math.round(slotSize * 0.27);
        const edgeT = Math.max(2, Math.round(4 * sc));
        ctx.fillStyle = ot.color;
        ctx.fillRect(gemX, gemY, gemW, gemH);
        ctx.fillStyle = ot.edge;
        ctx.fillRect(gemX, gemY + gemH - edgeT, gemW, edgeT);
        ctx.fillRect(gemX + gemW - edgeT, gemY, edgeT, gemH);
        ctx.fillStyle = ot.spec;
        ctx.fillRect(gemX + 2, gemY + 2, Math.max(3, Math.round(6 * sc)), Math.max(2, Math.round(3 * sc)));
        if (showLabels) {
          pixelText(ot.name, sx + slotSize / 2, sy + slotSize - 12, 9, '#fff', 'center');
          pixelText('+$' + fmtShort(ot.value) + '/s', sx + slotSize / 2, sy + slotSize - 22, 8, C.textHi, 'center');
        }
        if (hovered && game.carried.length < game.carriedMax && !game.drag) {
          pixelText('take', sx + slotSize / 2, sy + 4, 9, '#ffe080', 'center');
        }
      } else {
        pixelText('—', sx + slotSize / 2, sy + slotSize / 2 - 4, 14, '#3a2818', 'center');
        if (hovered) {
          if (isDropTarget) {
            pixelText('drop', sx + slotSize / 2, sy + slotSize / 2 + 12, 10, '#ffe080', 'center');
          } else if (game.carried.length > 0 && !game.drag) {
            pixelText('place', sx + slotSize / 2, sy + slotSize / 2 + 12, 9, '#aaa', 'center');
          }
        }
      }

      // mouseup over this slot — handle drop or click
      if (hovered && mouse.released) {
        if (game.drag && game.drag.source === 'carried' && !occupied) {
          // DROP: place dragged ore here, remove from carried
          if (game.drag.idx < game.carried.length && game.carried[game.drag.idx] === game.drag.type) {
            game.placed[i] = game.drag.type;
            game.carried.splice(game.drag.idx, 1);
            sendPlacedSync();
            game.drag = null;
          }
        } else if (!mouse.releasedAsDrag && !game.drag) {
          // single click semantics
          if (occupied && game.carried.length < game.carriedMax) {
            game.carried.push(o);
            game.placed[i] = null;
            sendPlacedSync();
          } else if (!occupied && game.carried.length > 0) {
            const ore = game.carried.shift();
            game.placed[i] = ore;
            sendPlacedSync();
          }
        }
      }
    }
    ctx.restore(); // end clip

    // scrollbar on the right edge of the viewport if scrollable
    if (maxScroll > 0) {
      const sbX = gridX + gridW + 4;
      const sbW = 6;
      ctx.fillStyle = '#1a0e08';
      ctx.fillRect(sbX, gridY, sbW, viewportH);
      const thumbH = Math.max(20, viewportH * (viewportH / contentH));
      const thumbY = gridY + (scrollY / maxScroll) * (viewportH - thumbH);
      ctx.fillStyle = '#8a5a30';
      ctx.fillRect(sbX, thumbY, sbW, thumbH);
      ctx.fillStyle = '#ffe080';
      ctx.fillRect(sbX, thumbY, sbW, 2);
      // tiny arrows for touch users
      ctx.fillStyle = '#3a2414';
      ctx.fillRect(sbX - 16, gridY, 14, 14);
      ctx.fillRect(sbX - 16, gridY + viewportH - 14, 14, 14);
      pixelText('^', sbX - 9, gridY + 1, 12, '#ffe080', 'center');
      pixelText('v', sbX - 9, gridY + viewportH - 13, 12, '#ffe080', 'center');
      // up arrow click
      const upHover = mouse.x >= sbX - 16 && mouse.x <= sbX - 2 &&
                      mouse.y >= gridY && mouse.y <= gridY + 14;
      if (upHover && mouse.clicked) game.troveScrollY = Math.max(0, scrollY - 88);
      // down arrow click
      const dnHover = mouse.x >= sbX - 16 && mouse.x <= sbX - 2 &&
                      mouse.y >= gridY + viewportH - 14 && mouse.y <= gridY + viewportH;
      if (dnHover && mouse.clicked) game.troveScrollY = Math.min(maxScroll, scrollY + 88);
    }

    // Action buttons row above the tray
    if (button(W / 2 - 280, H - 130, 130, 26, 'PLACE BEST')) placeBestOres();
    const sellAllValue = game.carried.reduce((s, t) => s + ORE_TYPES[t].value * SELL_MULT, 0);
    if (button(W / 2 - 140, H - 130, 130, 26, `SELL ALL $${fmtShort(sellAllValue)}`, game.carried.length > 0)) {
      sellAllCarried();
    }
    const tCost = trovePrice();
    const tLabel = `+6 SLOTS $${fmtShort(tCost)}`;
    if (button(W / 2 + 0, H - 130, 170, 26, tLabel, game.money >= tCost)) {
      buyItem('trove', tCost, () => {
        game.troveExpansions++;
        for (let i = 0; i < 6; i++) game.placed.push(null);
      });
    }
    // current slot count display
    pixelText(`SLOTS: ${placedSlotCount()}`, W / 2 + 180, H - 124, 11, C.textDim);

    // CARRIED tray — drag from here onto a placed slot, or click to sell
    const trayW = Math.max(400, 24 + game.carriedMax * 26);
    const trayX = (W - trayW) / 2;
    panel(trayX, H - 96, trayW, 60);
    pixelText('CARRIED   (drag to slot, or click to sell)', trayX + 8, H - 90, 11, C.textDim);
    const slotsCount = game.carriedMax;
    const usable = trayW - 16;
    const stepW = Math.min(30, Math.floor(usable / slotsCount));
    const slotPix = Math.max(12, stepW - 4);
    for (let i = 0; i < slotsCount; i++) {
      const cx = trayX + 8 + i * stepW;
      const cy = H - 70;
      ctx.fillStyle = '#1a1020';
      ctx.fillRect(cx, cy, slotPix, slotPix);
      ctx.fillStyle = '#3a2a4a';
      ctx.fillRect(cx, cy, slotPix, 1);
      ctx.fillRect(cx, cy, 1, slotPix);
      if (i < game.carried.length) {
        const ore = game.carried[i];
        const iconSize = Math.max(8, slotPix - 4);
        const iconOff = (slotPix - iconSize) / 2;
        // hide icon if this is the source of an active drag (it follows the cursor instead)
        const isDragSrc = game.drag && game.drag.source === 'carried' && game.drag.idx === i;
        if (!isDragSrc) drawOreIcon(cx + iconOff, cy + iconOff, ore, iconSize);
        const hovered = mouse.x >= cx && mouse.x <= cx + slotPix && mouse.y >= cy && mouse.y <= cy + slotPix;
        if (hovered) {
          ctx.fillStyle = 'rgba(255,224,128,0.18)';
          ctx.fillRect(cx, cy, slotPix, slotPix);
          const value = ORE_TYPES[ore].value * SELL_MULT;
          pixelText('$' + fmtShort(value), cx + slotPix / 2, cy - 12, 10, '#ffe080', 'center');
          // mousedown starts a drag (defers sell to mouseup)
          if (mouse.clicked && !game.drag) {
            game.drag = { source: 'carried', idx: i, type: ore };
          }
        }
      }
    }

    // money top-right
    panel(W - 170, 14, 156, 32);
    drawCoin(W - 160, 24, 12);
    pixelText('$' + fmtShort(game.money), W - 140, 22, 14, '#fff');

    if (button(W - 140, H - 30, 120, 26, 'LEAVE [B]')) {
      game.scene = 'surface';
    }
    if (input('b') && justPressed['b'] !== undefined) {
      game.scene = 'surface';
    }

    // resolve a drag that wasn't consumed by a slot drop
    if (mouse.released && game.drag) {
      if (!mouse.releasedAsDrag && game.drag.source === 'carried') {
        // it was a click, not a drag → sell the ore
        sellOreAt(game.drag.idx);
      }
      game.drag = null;
    }

    // draw the dragged ore at cursor position (ghost) — drawn last so it's on top
    if (game.drag && mouse.down) {
      const t = game.drag.type;
      const ot = ORE_TYPES[t];
      if (ot.glow) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = ot.glow;
        ctx.fillRect(mouse.x - 12, mouse.y - 12, 24, 24);
        ctx.globalAlpha = 1;
      }
      drawOreIcon(mouse.x - 8, mouse.y - 8, t, 16);
    }
  }

      ctx.fillRect(gridX - 12, gridY - 10, gridW + 24, viewportH + 20);
      ctx.fillStyle = '#3a2414';
      ctx.fillRect(gridX - 12, gridY - 10, gridW + 24, 4);
      ctx.fillRect(gridX - 12, gridY + viewportH + 6, gridW + 24, 4);

      ctx.save();
      ctx.beginPath();
      ctx.rect(gridX - 4, gridY - 4, gridW + 8, viewportH + 8);

      for (let i = 0; i < slotCount; i++) {
        const cx = i % cols, cy = (i / cols) | 0;
        const sx = gridX + cx * (slotSize + gap);
        const sy = gridY + cy * (slotSize + gap) - scrollY;

        ctx.fillStyle = '#1a0e08';

        ctx.fillStyle = '#8a5a30';

        ctx.fillRect(sx, sy + slotSize - 2, slotSize, 2);
        ctx.fillRect(sx, sy, 2, slotSize);
        ctx.fillRect(sx + slotSize - 2, sy, 2, slotSize);
        const o = placed[i];
        if (o && ORE_TYPES[o]) {
          const ot = ORE_TYPES[o];
          ctx.fillStyle = '#3a2210';
          ctx.fillRect(sx + 18, sy + slotSize - 24, 44, 8);
          if (ot.glow) {
            const pulse = 0.6 + 0.3 * Math.sin(game.timeAcc * 3 + i);

          ctx.fillStyle = ot.color;
          ctx.fillRect(sx + 28, sy + 22, 24, 18);
          ctx.fillStyle = ot.edge;
          ctx.fillRect(sx + 28, sy + 36, 24, 4);

        } else {
          pixelText('—', sx + slotSize / 2, sy + slotSize / 2 - 4, 14, '#3a2818', 'center');
        }
      }
      ctx.restore();

      if (maxScroll > 0) {

        ctx.fillStyle = '#1a0e08';
        ctx.fillRect(sbX, gridY, sbW, viewportH);
        const thumbH = Math.max(20, viewportH * (viewportH / contentH));
        const thumbY = gridY + (scrollY / maxScroll) * (viewportH - thumbH);
        ctx.fillStyle = '#8a5a30';
        ctx.fillRect(sbX, thumbY, sbW, thumbH);

    pixelText('read-only — you cannot take or place', W / 2, H - 110, 11, C.textDim, 'center');

    if (input('b')) { game.visit = null; game.scene = 'surface'; }
  }

  function sellOreAt(idx) {
    if (idx < 0 || idx >= game.carried.length) return;
    const ore = game.carried[idx];
    if (isOnline()) {
      net.sock.emit('sell_ores', { ores: [ore] });
    } else {
      game.money += ORE_TYPES[ore].value * SELL_MULT;
    }
    game.carried.splice(idx, 1);
  }

  function sellAllCarried() {
    if (game.carried.length === 0) return;
    const ores = game.carried.slice();
    if (isOnline()) {
      net.sock.emit('sell_ores', { ores });
    } else {
      const total = ores.reduce((s, t) => s + ORE_TYPES[t].value * SELL_MULT, 0);
      game.money += total;
    }
    game.carried = [];
  }

  // ---------- CONVERSION MACHINE ----------
  function openMachine() {
    game.scene = 'machine';
    game.machine = {
      input: [], source: [],
      search: '',
      filter: null, // null | 'normal' | 'gold' | 'diamond' | 'rainbow'
    };
    machineSearchInput.value = '';
    machineSearchInput.classList.add('show');
    positionMachineSearch();
    setTimeout(() => machineSearchInput.focus(), 30);

  function positionMachineSearch() {
    // align over the canvas where the search bar sits in the drawn UI
    const r = canvas.getBoundingClientRect();
    const xScale = r.width / W, yScale = r.height / H;
    const ix = 40, iy = 200, iw = 280, ih = 28; // canvas-space slot for the bar
    machineSearchInput.style.left = (r.left + ix * xScale) + 'px';
